// ─── Speech ───────────────────────────────────────────────────────────────────
let globalSpeed = 1;
let voicesLoaded = false;

function getVoices() {
  return window.speechSynthesis.getVoices();
}
window.speechSynthesis.onvoiceschanged = () => { voicesLoaded = true; };

function speak(text, rate, onEnd) {
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "fr-FR";
    u.rate = rate !== undefined ? rate : globalSpeed;
    const voices = getVoices();
    const fr = voices.find(v => v.lang === "fr-FR") || voices.find(v => v.lang.startsWith("fr"));
    if (fr) u.voice = fr;
    if (onEnd) u.onend = onEnd;
    window.speechSynthesis.speak(u);
  }, 50);
}

// ─── Claude API ───────────────────────────────────────────────────────────────
async function callClaude(messages, system) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system, messages }),
    });
    const d = await res.json();
    return d.content?.[0]?.text || "Viga! Proovi uuesti.";
  } catch(e) {
    return "Ühenduse viga. Kontrolli internetti.";
  }
}

// ─── SpeakBtn helper ─────────────────────────────────────────────────────────
function SpeakBtn({ text, size = 18 }) {
  return (
    <button onClick={e => { e.stopPropagation(); speak(text); }}
      style={{ background: C.blue, color: "#fff", border: "none", borderRadius: 10,
        width: size + 14, height: size + 10, fontSize: size - 2, cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
        boxShadow: "0 2px 0 rgba(74,144,217,0.35)" }}>
      🔊
    </button>
  );
}

// FLASHCARDS
// ═══════════════════════════════════════════════════════════════════════════════
function Flashcards({ chapter }) {
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(new Set());
  const [showEx, setShowEx] = useState(false);
  const w = chapter.vocabulary[idx];

  function next(mark) {
    if (mark) setKnown(k => new Set([...k, idx]));
    setFlipped(false); setShowEx(false);
    setTimeout(() => setIdx(i => (i + 1) % chapter.vocabulary.length), 150);
  }
  function prev() {
    setFlipped(false); setShowEx(false);
    setTimeout(() => setIdx(i => (i - 1 + chapter.vocabulary.length) % chapter.vocabulary.length), 150);
  }

  const emoji = CHAPTER_EMOJI[chapter.id] || "📖";

  return (
    <div style={{ padding: 16 }}>
      {/* Progress */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <span style={s.badge(C.blueSoft, C.blue)}>{idx + 1} / {chapter.vocabulary.length}</span>
        <span style={s.badge(C.greenSoft, C.green)}>✓ {known.size} õpitud</span>
        <div style={{ flex: 1, height: 8, background: "#EEE", borderRadius: 4, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${((idx+1)/chapter.vocabulary.length)*100}%`, background: `linear-gradient(90deg,${C.blue},${C.pink})`, borderRadius: 4, transition: "width .3s" }}/>
        </div>
      </div>

      {/* Card */}
      <div className="pop" onClick={() => setFlipped(!flipped)}
        style={{ ...s.card({ minHeight: 210, cursor: "pointer", textAlign: "center",
          display: "flex", flexDirection: "column", justifyContent: "center",
          alignItems: "center", gap: 12, userSelect: "none",
          background: flipped
            ? `linear-gradient(135deg,${C.purpleSoft},#fff)`
            : `linear-gradient(135deg,${C.blueSoft},#fff)`,
          borderColor: flipped ? C.purple : C.blue, borderWidth: 3 }) }}>
        <div style={{ fontSize: 40 }}>{emoji}</div>
        <div style={{ fontSize: 11, color: C.muted, letterSpacing: 3, textTransform: "uppercase", fontWeight: 700 }}>
          {flipped ? "🇪🇪 Eesti keeles" : "🇫🇷 Prantsuse keeles"}
        </div>
        <div style={{ fontSize: 28, fontWeight: 900, color: flipped ? C.purple : C.blue, lineHeight: 1.2 }}>
          {flipped ? w.et : w.fr}
        </div>
        <div style={{ fontSize: 12, color: C.muted }}>👆 klõpsa tõlke nägemiseks</div>
      </div>

      {/* Actions row */}
      <div style={{ ...s.row(10), marginTop: 12, justifyContent: "center" }}>
        <SpeakBtn text={w.fr} size={20} />
        {w.ex && !showEx && (
          <button style={s.btnOutline(C.orange)} onClick={() => setShowEx(true)}>📝 Näitelause</button>
        )}
      </div>

      {/* Example sentence */}
      {showEx && w.ex && (
        <div className="fade" style={{ ...s.card({ background: C.orangeSoft, borderColor: C.orange, marginTop: 10, textAlign: "center" }) }}>
          <div style={{ fontSize: 11, color: C.orange, fontWeight: 800, marginBottom: 4 }}>📝 NÄITELAUSE</div>
          <div style={{ fontSize: 16, color: C.text, fontWeight: 700 }}>{w.ex}</div>
          <div style={{ marginTop: 8 }}><SpeakBtn text={w.ex} /></div>
        </div>
      )}

      {/* Navigation buttons */}
      <div style={{ ...s.row(10), marginTop: 14, justifyContent: "center" }}>
        <button style={s.btn("#95A5A6")} onClick={prev}>← Eelmine</button>
        <button style={s.btn(C.red)} onClick={() => next(false)}>🔄 Korda</button>
        <button style={s.btn(C.green)} onClick={() => next(true)}>✓ Tean!</button>
      </div>
    </div>
  );
}

// DIALOOG — kuulamine + päheõppimine
// ═══════════════════════════════════════════════════════════════════════════════
function Dialogue({ chapter }) {
  const [view, setView] = useState("list"); // list | listen | memorize
  const [selDlg, setSelDlg] = useState(null);
  const [step, setStep] = useState(0);
  const [showEt, setShowEt] = useState(false);
  const [showFr, setShowFr] = useState(false);
  const [playingAll, setPlayingAll] = useState(false);
  const [hlIdx, setHlIdx] = useState(null);
  const [speed, setSpeed] = useState(1);
  const synth = useRef(window.speechSynthesis);
  useEffect(() => () => synth.current.cancel(), []);

  function startListen(dlg) { setSelDlg(dlg); setView("listen"); setStep(0); setHlIdx(null); setPlayingAll(false); }
  function startMemorize(dlg) { setSelDlg(dlg); setView("memorize"); setStep(0); setShowEt(false); setShowFr(false); }

  function speakLine(text) { speak(text, speed); }

  function playAll(dlg) {
    synth.current.cancel();
    setPlayingAll(true); setHlIdx(0);
    let i = 0;
    function next() {
      if (i >= dlg.lines.length) { setPlayingAll(false); setHlIdx(null); return; }
      setHlIdx(i);
      const u = new SpeechSynthesisUtterance(dlg.lines[i].fr);
      u.lang = "fr-FR"; u.rate = speed;
      const fr = getVoices().find(v => v.lang.startsWith("fr"));
      if (fr) u.voice = fr;
      u.onend = () => { i++; setTimeout(next, 600); };
      synth.current.speak(u);
    }
    next();
  }

  function stopAll() { synth.current.cancel(); setPlayingAll(false); setHlIdx(null); }

  // ── LIST view ──
  if (view === "list") return (
    <div style={{ padding: 16 }}>
      <div style={{ ...s.card({ background: C.pinkSoft, borderColor: C.pink, marginBottom: 16, textAlign: "center" }) }}>
        <div style={{ fontSize: 32, marginBottom: 6 }}>💬</div>
        <div style={{ fontWeight: 800, fontSize: 16, color: C.pink }}>Vali dialoog</div>
        <div style={{ fontSize: 13, color: C.muted, marginTop: 4 }}>Kuula lauseid või õpi pähe</div>
      </div>
      {chapter.dialogues.map(d => (
        <div key={d.id} style={s.card({ marginBottom: 12 })}>
          <div style={{ fontWeight: 800, fontSize: 15, color: C.text, marginBottom: 12 }}>💬 {d.title}</div>
          <div style={{ fontSize: 12, color: C.muted, marginBottom: 12 }}>{d.lines.length} lauset</div>
          {/* Preview kõik laused */}
          <div style={{ background: "#F8F8F8", borderRadius: 12, padding: 12, marginBottom: 12 }}>
            {d.lines.map((line, i) => (
              <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, marginBottom: 8 }}>
                <div style={{ ...s.badge(C.blueSoft, C.blue), fontSize: 11, minWidth: "fit-content" }}>{line.speaker}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, color: C.blue, fontWeight: 700 }}>{line.fr}</div>
                  <div style={{ fontSize: 12, color: C.muted }}>{line.et}</div>
                </div>
                <SpeakBtn text={line.fr} size={16} />
              </div>
            ))}
          </div>
          <div style={s.row(8)}>
            <button style={s.btn(C.blue, true)} onClick={() => startListen(d)}>🔊 Kuula</button>
            <button style={s.btn(C.purple, true)} onClick={() => startMemorize(d)}>🧠 Õpi pähe</button>
          </div>
        </div>
      ))}
    </div>
  );

  // ── LISTEN view ──
  if (view === "listen" && selDlg) return (
    <div style={{ padding: 16 }}>
      <div style={{ ...s.row(10), marginBottom: 14 }}>
        <button style={s.btn("#95A5A6", true)} onClick={() => { stopAll(); setView("list"); }}>← Tagasi</button>
        <span style={{ fontWeight: 800, fontSize: 15 }}>🔊 {selDlg.title}</span>
      </div>

      {/* Speed + play all */}
      <div style={s.card({ marginBottom: 14 })}>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 8 }}>🎚️ Kiirus:</div>
        <div style={{ ...s.row(6), marginBottom: 12 }}>
          {[0.5, 0.75, 1, 1.25].map(sp => (
            <button key={sp} style={s.btn(speed === sp ? C.blue : "#DDD", true, { color: speed === sp ? "#fff" : "#555" })}
              onClick={() => { setSpeed(sp); globalSpeed = sp; }}>{sp}x</button>
          ))}
        </div>
        <button style={s.btn(playingAll ? C.red : C.green)}
          onClick={() => playingAll ? stopAll() : playAll(selDlg)}>
          {playingAll ? "⏹ Stopp" : "▶ Mängi kõik järjest"}
        </button>
      </div>

      {/* Lines */}
      {selDlg.lines.map((line, i) => (
        <div key={i} className={hlIdx === i ? "pop" : ""} style={s.card({
          marginBottom: 10,
          borderColor: hlIdx === i ? C.blue : C.border,
          borderWidth: hlIdx === i ? 3 : 2,
          background: hlIdx === i ? C.blueSoft : C.card,
        })}>
          <div style={{ ...s.row(10), justifyContent: "space-between" }}>
            <div style={{ flex: 1 }}>
              <div style={s.row(8)}>
                <span style={s.badge(C.blueSoft, C.blue)}>{line.speaker}</span>
              </div>
              <div style={{ fontSize: 17, fontWeight: 800, color: C.blue, marginTop: 6 }}>{line.fr}</div>
              <div style={{ fontSize: 13, color: C.muted, marginTop: 4 }}>🇪🇪 {line.et}</div>
            </div>
            <SpeakBtn text={line.fr} size={22} />
          </div>
        </div>
      ))}
    </div>
  );

  // ── MEMORIZE view ──
  if (view === "memorize" && selDlg) {
    const line = selDlg.lines[step];
    const isLast = step >= selDlg.lines.length - 1;
    return (
      <div style={{ padding: 16 }}>
        <div style={{ ...s.row(10), marginBottom: 14 }}>
          <button style={s.btn("#95A5A6", true)} onClick={() => setView("list")}>← Tagasi</button>
          <span style={s.badge(C.purpleSoft, C.purple)}>🧠 Päheõppimine</span>
          <span style={s.badge(C.blueSoft, C.blue)}>{step + 1}/{selDlg.lines.length}</span>
        </div>

        {/* Eesti lause */}
        <div style={s.card({ background: `linear-gradient(135deg,#FFF0F5,#fff)`, borderColor: C.pink, borderWidth: 3, marginBottom: 14, textAlign: "center", padding: 24 })}>
          <div style={{ fontSize: 13, color: C.muted, marginBottom: 8, fontWeight: 700 }}>🇪🇪 EESTI KEELES:</div>
          <div style={{ fontSize: 20, fontWeight: 900, color: C.pink }}>{line.et}</div>
          <div style={{ marginTop: 10, fontSize: 13, color: C.muted }}>Tõlgi prantsuse keelde! 👇</div>
        </div>

        {/* Prantsuse lause — peidetud */}
        {!showFr ? (
          <button style={{ ...s.btn(C.purple), width: "100%", marginBottom: 14 }}
            onClick={() => { setShowFr(true); speakLine(line.fr); }}>
            👁 Näita prantsuse lauset + kuula
          </button>
        ) : (
          <div className="fade" style={s.card({ background: C.purpleSoft, borderColor: C.purple, borderWidth: 3, marginBottom: 14, textAlign: "center", padding: 20 })}>
            <div style={{ fontSize: 13, color: C.muted, marginBottom: 8, fontWeight: 700 }}>🇫🇷 PRANTSUSE KEELES:</div>
            <div style={{ fontSize: 20, fontWeight: 900, color: C.purple }}>{line.fr}</div>
            <button style={{ ...s.btn(C.blue, true), marginTop: 12 }} onClick={() => speakLine(line.fr)}>🔊 Kuula uuesti</button>
          </div>
        )}

        <button style={{ ...s.btn(C.green), width: "100%" }}
          onClick={() => { if (isLast) setView("list"); else { setStep(s => s + 1); setShowFr(false); } }}>
          {isLast ? "✅ Valmis!" : "Järgmine lause →"}
        </button>
      </div>
    );
  }

  return null;
}

// ═══════════════════════════════════════════════════════════════════════════════
// KUULAMINE
// ═══════════════════════════════════════════════════════════════════════════════
function Listening({ chapter }) {
  const [speed, setSpeed] = useState(1);
  const [playingDlg, setPlayingDlg] = useState(null);
  const [hlLine, setHlLine] = useState(null);
  const synth = useRef(window.speechSynthesis);
  useEffect(() => { globalSpeed = speed; }, [speed]);
  useEffect(() => () => synth.current.cancel(), []);

  function speakLine(text) { speak(text, speed); }

  function speakDialogue(dlg) {
    synth.current.cancel();
    setPlayingDlg(dlg.id);
    let i = 0;
    function next() {
      if (i >= dlg.lines.length) { setPlayingDlg(null); setHlLine(null); return; }
      setHlLine(i);
      const u = new SpeechSynthesisUtterance(dlg.lines[i].fr);
      u.lang = "fr-FR"; u.rate = speed;
      const fr = getVoices().find(v => v.lang.startsWith("fr"));
      if (fr) u.voice = fr;
      u.onend = () => { i++; setTimeout(next, 600); };
      synth.current.speak(u);
    }
    next();
  }

  function stopAll() { synth.current.cancel(); setPlayingDlg(null); setHlLine(null); }

  return (
    <div style={{ padding: 16 }}>
      {/* Speed */}
      <div style={s.card({ marginBottom: 16, background: C.blueSoft, borderColor: C.blue })}>
        <div style={{ fontWeight: 800, color: C.blue, marginBottom: 10 }}>🎚️ Esitluskiirus</div>
        <div style={s.row(8)}>
          {[0.5, 0.75, 1, 1.25].map(sp => (
            <button key={sp} style={s.btn(speed === sp ? C.blue : "#DDD", true, { color: speed === sp ? "#fff" : "#555" })}
              onClick={() => setSpeed(sp)}>{sp}x</button>
          ))}
        </div>
        {speed < 1 && <div style={{ fontSize: 12, color: C.orange, marginTop: 8, fontWeight: 700 }}>🐢 Aeglane tempo — hea algajale!</div>}
        {speed > 1 && <div style={{ fontSize: 12, color: C.pink, marginTop: 8, fontWeight: 700 }}>🚀 Kiire tempo — väljakutse!</div>}
      </div>

      {/* Sõnavara */}
      <div style={s.card({ marginBottom: 16 })}>
        <div style={{ fontWeight: 800, fontSize: 15, color: C.text, marginBottom: 12 }}>🔤 Sõnavara hääldus</div>
        {chapter.vocabulary.map((w, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0", borderBottom: i < chapter.vocabulary.length - 1 ? `1.5px solid ${C.border}` : "none" }}>
            <div>
              <span style={{ color: C.blue, fontWeight: 800, fontSize: 15 }}>{w.fr}</span>
              <span style={{ color: C.muted, fontSize: 13, marginLeft: 8 }}>= {w.et}</span>
            </div>
            <SpeakBtn text={w.fr} />
          </div>
        ))}
      </div>

      {/* Dialoogid */}
      <div style={{ fontWeight: 800, fontSize: 15, color: C.text, marginBottom: 12 }}>💬 Dialoogid</div>
      {chapter.dialogues.map(dlg => (
        <div key={dlg.id} style={s.card({ marginBottom: 14 })}>
          <div style={{ ...s.row(10), justifyContent: "space-between", marginBottom: 14 }}>
            <div style={{ fontWeight: 800, fontSize: 14, color: C.text }}>{dlg.title}</div>
            <button style={s.btn(playingDlg === dlg.id ? C.red : C.green, true)}
              onClick={() => playingDlg === dlg.id ? stopAll() : speakDialogue(dlg)}>
              {playingDlg === dlg.id ? "⏹ Stopp" : "▶ Kuula kõik"}
            </button>
          </div>
          {dlg.lines.map((line, i) => (
            <div key={i} style={{
              padding: "10px 12px", borderRadius: 12, marginBottom: 6,
              background: hlLine === i && playingDlg === dlg.id ? C.blueSoft : "#F8F9FA",
              border: `2px solid ${hlLine === i && playingDlg === dlg.id ? C.blue : "#EEE"}`,
              transition: "all .2s"
            }}>
              <div style={{ ...s.row(8), justifyContent: "space-between" }}>
                <div style={{ flex: 1 }}>
                  <span style={s.badge(C.pinkSoft, C.pink)}>{line.speaker}</span>
                  <div style={{ fontSize: 15, fontWeight: 700, color: C.blue, marginTop: 5 }}>{line.fr}</div>
                  <div style={{ fontSize: 12, color: C.muted, marginTop: 3 }}>🇪🇪 {line.et}</div>
                </div>
                <SpeakBtn text={line.fr} />
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// VIKTORIIN — parandatud
// ═══════════════════════════════════════════════════════════════════════════════
function Quiz({ chapter }) {
  const [qs, setQs] = useState(null);
  const [loading, setLoading] = useState(false);
  const [ans, setAns] = useState({});
  const [done, setDone] = useState(false);
  const [score, setScore] = useState(0);
  const [error, setError] = useState(null);

  async function gen() {
    setLoading(true); setAns({}); setDone(false); setError(null); setQs(null);
    const vocab = chapter.vocabulary.slice(0, 10).map(w => `"${w.fr}" = "${w.et}"`).join(", ");
    const system = "Sa oled prantsuse keele õpetaja. Tagasta AINULT puhas JSON array, mitte midagi muud. Ei mingit teksti enne ega pärast. Ei mingeid markdown märke nagu ``` või `json`.";
    const prompt = `Loo 5 valikvastustega küsimust 9-aastasele eesti lapsele prantsuse keele kohta.\nSõnavara: ${vocab}\n\nTagasta täpselt selles formaadis:\n[{"q":"Mis tähendab le nez?","options":["nina","suu","silm","kõrv"],"answer":"nina"},{"q":"...","options":[...],"answer":"..."}]`;
    try {
      const raw = await callClaude([{ role: "user", content: prompt }], system);
      // Puhasta vastus
      let clean = raw.trim();
      clean = clean.replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/\s*```$/i, "").trim();
      // Leia JSON array
      const start = clean.indexOf("[");
      const end = clean.lastIndexOf("]");
      if (start === -1 || end === -1) throw new Error("JSON ei leitud");
      clean = clean.slice(start, end + 1);
      const parsed = JSON.parse(clean);
      if (!Array.isArray(parsed) || parsed.length === 0) throw new Error("Tühi array");
      setQs(parsed);
    } catch (e) {
      setError("Küsimuste genereerimine ebaõnnestus. Proovi uuesti!");
      setQs([]);
    }
    setLoading(false);
  }

  function submit() {
    let sc = 0;
    qs.forEach((q, i) => { if (ans[i] === q.answer) sc++; });
    setScore(sc); setDone(true);
  }

  if (!qs && !loading) return (
    <div style={{ padding: 16 }}>
      <div style={s.card({ textAlign: "center", padding: 40, background: `linear-gradient(135deg,${C.orangeSoft},#fff)`, borderColor: C.orange })}>
        <div style={{ fontSize: 60, marginBottom: 12 }} className="bounce">🎯</div>
        <div style={{ fontSize: 20, fontWeight: 900, color: C.orange, marginBottom: 8 }}>Viktoriin</div>
        <div style={{ color: C.muted, marginBottom: 24, fontSize: 14 }}>Claude genereerib 5 küsimust Leçon {chapter.id} sõnavara põhjal</div>
        <button style={s.btn(C.orange)} onClick={gen}>🚀 Alusta viktoriini!</button>
      </div>
    </div>
  );

  if (loading) return (
    <div style={{ padding: 16, textAlign: "center" }}>
      <div style={s.card({ padding: 40 })}>
        <div style={{ fontSize: 50, marginBottom: 16 }} className="bounce">⏳</div>
        <div style={{ fontWeight: 800, color: C.orange }}>Genereerin küsimusi...</div>
      </div>
    </div>
  );

  if (error || qs.length === 0) return (
    <div style={{ padding: 16 }}>
      <div style={s.card({ textAlign: "center", padding: 30, background: C.redSoft, borderColor: C.red })}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>😕</div>
        <div style={{ color: C.red, fontWeight: 800, marginBottom: 16 }}>{error || "Viga küsimuste genereerimisel."}</div>
        <button style={s.btn(C.orange)} onClick={gen}>🔄 Proovi uuesti</button>
      </div>
    </div>
  );

  return (
    <div style={{ padding: 16 }}>
      {done && (
        <div className="pop" style={s.card({ textAlign: "center", marginBottom: 20, padding: 30,
          background: score >= 4 ? C.greenSoft : C.orangeSoft,
          borderColor: score >= 4 ? C.green : C.orange, borderWidth: 3 })}>
          <div style={{ fontSize: 60 }}>{score === 5 ? "🏆" : score >= 3 ? "👍" : "💪"}</div>
          <div style={{ fontSize: 36, fontWeight: 900, color: score >= 4 ? C.green : C.orange, marginTop: 8 }}>{score} / {qs.length}</div>
          <div style={{ color: C.muted, fontSize: 15, marginTop: 6 }}>
            {score === 5 ? "Suurepärane! Kõik õige! 🌟" : score >= 3 ? "Väga hea töö! 👏" : "Harjuta veel, läheb paremaks! 💪"}
          </div>
          <button style={{ ...s.btn(C.orange), marginTop: 18 }} onClick={gen}>🔄 Uus viktoriin</button>
        </div>
      )}

      {qs.map((q, i) => (
        <div key={i} style={s.card({ marginBottom: 14 })}>
          <div style={{ fontWeight: 800, fontSize: 16, color: C.text, marginBottom: 14 }}>
            <span style={s.badge(C.orangeSoft, C.orange)}>{i + 1}</span> {q.q}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {q.options.map((opt, oi) => {
              let bg = "#F8F9FA", border = "#DDD", color = C.text;
              if (done) {
                if (opt === q.answer) { bg = C.greenSoft; border = C.green; color = C.green; }
                else if (opt === ans[i] && ans[i] !== q.answer) { bg = C.redSoft; border = C.red; color = C.red; }
              } else if (ans[i] === opt) { bg = C.blueSoft; border = C.blue; color = C.blue; }
              return (
                <button key={oi} disabled={done}
                  onClick={() => setAns({ ...ans, [i]: opt })}
                  style={{ padding: "12px 16px", borderRadius: 14, border: `2.5px solid ${border}`,
                    background: bg, color, textAlign: "left", cursor: done ? "default" : "pointer",
                    fontFamily: "inherit", fontSize: 15, fontWeight: 700, transition: "all .15s",
                    boxShadow: ans[i] === opt && !done ? "0 3px 10px rgba(74,144,217,0.2)" : "none" }}>
                  {done && opt === q.answer ? "✓ " : done && opt === ans[i] && ans[i] !== q.answer ? "✗ " : ""}
                  {opt}
                </button>
              );
            })}
          </div>
        </div>
      ))}

      {!done && qs.length > 0 && (
        <button style={{ ...s.btn(C.orange), width: "100%", fontSize: 16 }}
          disabled={Object.keys(ans).length < qs.length}
          onClick={submit}>
          ✅ Kontrolli vastuseid ({Object.keys(ans).length}/{qs.length} vastatud)
        </button>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id:"flash", label:"🃏 Sõnad", color: C.blue },
  { id:"dlg",   label:"💬 Dialoog", color: C.pink },
  { id:"listen",label:"🔊 Kuula", color: C.green },
  { id:"quiz",  label:"🎯 Viktoriin", color: C.orange },
];
const GROUPS = [
  { label:"41–45", ids:[41,42,43,44,45] },
  { label:"46–50", ids:[46,47,48,49,50] },
  { label:"51–55", ids:[51,52,53,54,55] },
  { label:"56–60", ids:[56,57,58,59,60] },
];

function App() {
  const [tab, setTab] = useState("flash");
  const [chIdx, setChIdx] = useState(0);
  const [grpIdx, setGrpIdx] = useState(0);
  const chapter = CHAPTERS[chIdx];

  function selectGroup(gi) {
    setGrpIdx(gi);
    setChIdx(CHAPTERS.findIndex(c => c.id === GROUPS[gi].ids[0]));
  }

  const activeTab = TABS.find(t => t.id === tab);

  return (
    <div style={{ minHeight: "100vh", background: C.bg, paddingBottom: 80 }}>
      {/* Header */}
      <div style={{ background: "#fff", boxShadow: "0 2px 16px rgba(0,0,0,0.08)", padding: "14px 16px", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ ...s.row(12), marginBottom: 12 }}>
          <span style={{ fontSize: 30 }}>🇫🇷</span>
          <div>
            <div style={{ fontWeight: 900, fontSize: 18, fontFamily: "'Baloo 2',sans-serif", color: C.text }}>Prantsuse keel</div>
            <div style={{ fontSize: 12, color: C.muted }}>{CHAPTER_EMOJI[chapter.id]} {chapter.title}</div>
          </div>
        </div>

        {/* Rühmavalija */}
        <div style={{ ...s.row(6), marginBottom: 8 }}>
          {GROUPS.map((g, gi) => (
            <button key={gi} onClick={() => selectGroup(gi)}
              style={{ padding: "5px 12px", borderRadius: 20, border: `2px solid ${gi === grpIdx ? C.purple : "#DDD"}`,
                background: gi === grpIdx ? C.purpleSoft : "#F8F8F8",
                color: gi === grpIdx ? C.purple : C.muted, fontWeight: 800, fontSize: 12,
                cursor: "pointer", fontFamily: "inherit" }}>
              Leç {g.label}
            </button>
          ))}
        </div>

        {/* Peatükivalija */}
        <div style={{ display: "flex", gap: 5, marginBottom: 10, overflowX: "auto" }}>
          {GROUPS[grpIdx].ids.map(id => {
            const ci = CHAPTERS.findIndex(c => c.id === id);
            const active = chapter?.id === id;
            return (
              <button key={id} onClick={() => setChIdx(ci)}
                style={{ padding: "5px 12px", borderRadius: 20, border: `2px solid ${active ? C.orange : "#DDD"}`,
                  background: active ? C.orangeSoft : "#F8F8F8",
                  color: active ? C.orange : C.muted, fontWeight: 800, fontSize: 12,
                  cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                {CHAPTER_EMOJI[id]} {id}
              </button>
            );
          })}
        </div>

        {/* Tab navigation */}
        <div style={{ display: "flex", gap: 6 }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ flex: 1, padding: "8px 4px", borderRadius: 14,
                border: `2.5px solid ${tab === t.id ? t.color : "#EEE"}`,
                background: tab === t.id ? t.color : "#F8F8F8",
                color: tab === t.id ? "#fff" : C.muted,
                fontWeight: 800, fontSize: 11, cursor: "pointer",
                fontFamily: "inherit", whiteSpace: "nowrap",
                boxShadow: tab === t.id ? `0 3px 0 rgba(0,0,0,0.15)` : "none" }}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div className="fade" key={`${tab}-${chIdx}`}>
        {tab === "flash"  && <Flashcards chapter={chapter} />}
        {tab === "dlg"    && <Dialogue   chapter={chapter} />}
        {tab === "listen" && <Listening  chapter={chapter} />}
        {tab === "quiz"   && <Quiz       chapter={chapter} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
