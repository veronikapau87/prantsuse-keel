async function callClaude(messages, system) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages}),
  });
  const d = await res.json();
  return d.content?.[0]?.text || "Viga! Proovi uuesti.";
}

function Flashcards({chapter}) {
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [known,setKnown]=useState(new Set());
  const [showEx,setShowEx]=useState(false);
  const w=chapter.vocabulary[idx];
  function next(mark){
    if(mark)setKnown(k=>new Set([...k,idx]));
    setFlipped(false);setShowEx(false);
    setTimeout(()=>setIdx(i=>(i+1)%chapter.vocabulary.length),120);
  }
  return (
    <div style={{padding:16}}>
      <div style={{...s.row(8),marginBottom:12}}>
        <span style={s.badge(C.accent)}>{idx+1}/{chapter.vocabulary.length}</span>
        <span style={s.badge(C.green)}>{known.size} õpitud ✓</span>
      </div>
      <div onClick={()=>setFlipped(!flipped)} style={s.card({minHeight:190,cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:10,userSelect:"none",borderColor:flipped?C.purple:C.accent})}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:3,textTransform:"uppercase"}}>{flipped?"🇪🇪 Eesti keeles":"🇫🇷 Prantsuse keeles"}</div>
        <div style={{fontSize:26,fontWeight:900,color:flipped?C.et:C.fr,lineHeight:1.2}}>{flipped?w.et:w.fr}</div>
        <div style={{fontSize:11,color:C.muted}}>👆 klõpsa tõlke nägemiseks</div>
      </div>
      {w.ex&&!showEx&&<button style={{...s.btnOut(C.gold),marginTop:10,fontSize:12}} onClick={()=>setShowEx(true)}>📝 Näita näitelauset</button>}
      {w.ex&&showEx&&<div style={s.card({background:"#1c2128",borderColor:C.gold+"66",marginTop:10})}><div style={{fontSize:11,color:C.gold,marginBottom:4}}>📝 Näitelause</div><div style={{color:C.fr,fontSize:14}}>{w.ex}</div></div>}
      <div style={{...s.row(8),marginTop:14,justifyContent:"center"}}>
        <button style={s.btn("#374151")} onClick={()=>{setFlipped(false);setShowEx(false);setIdx(i=>(i-1+chapter.vocabulary.length)%chapter.vocabulary.length);}}>← Eelmine</button>
        <button style={s.btn(C.red)} onClick={()=>next(false)}>🔄 Korda</button>
        <button style={s.btn(C.green)} onClick={()=>next(true)}>✓ Tean!</button>
      </div>
    </div>
  );
}

function Dialogue({chapter}) {
  const [sel,setSel]=useState(null);
  const [phase,setPhase]=useState(1);
  const [li,setLi]=useState(0);
  const [showFr,setShowFr]=useState(false);
  const [input,setInput]=useState("");
  const [fb,setFb]=useState(null);
  const [loading,setLoading]=useState(false);
  const [rec,setRec]=useState(false);
  function start(d){setSel(d);setPhase(1);setLi(0);setShowFr(false);setInput("");setFb(null);}
  function nextLine(){
    const last=li>=sel.lines.length-1;
    if(!last){setLi(l=>l+1);setShowFr(false);setInput("");setFb(null);}
    else if(phase===1){setPhase(2);setLi(0);setShowFr(false);setInput("");setFb(null);}
    else setSel(null);
  }
  async function check(){
    if(!input.trim())return;
    setLoading(true);
    const line=sel.lines[li];
    const prompt=phase===1
      ?`9-aastane eesti laps tõlkis prantsuse keelest eesti keelde.\nOriginaal: "${line.fr}"\nTõlge: "${input}"\nÕige: "${line.et}"\nOle lahke ja julgustav. 2 lauset eesti keeles.`
      :`9-aastane eesti laps tõlkis eesti keelest prantsuse keelde.\nOriginaal: "${line.et}"\nVastus: "${input}"\nÕige: "${line.fr}"\nOle lahke ja julgustav. 2 lauset eesti keeles.`;
    const r=await callClaude([{role:"user",content:prompt}],"Sa oled lahke prantsuse keele õpetaja lastele. Vasta eesti keeles.");
    setFb(r);setLoading(false);
  }
  function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Brauser ei toeta kõnetuvastust.");return;}
    const r=new SR();
    r.lang=phase===2?"fr-FR":"et-EE";
    r.onstart=()=>setRec(true);r.onend=()=>setRec(false);
    r.onresult=e=>setInput(e.results[0][0].transcript);
    r.start();
  }
  if(!sel)return(
    <div style={{padding:16}}>
      <p style={{color:C.muted,marginTop:0,fontSize:13}}>Vali dialoog harjutamiseks:</p>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {chapter.dialogues.map(d=>(
          <button key={d.id} onClick={()=>start(d)} style={{...s.card({cursor:"pointer",textAlign:"left"})}}>
            <div style={{fontWeight:700,color:C.accent}}>💬 {d.title}</div>
            <div style={{color:C.muted,fontSize:12,marginTop:3}}>{d.lines.length} repliiki · 2 vooru</div>
          </button>
        ))}
      </div>
    </div>
  );
  const line=sel.lines[li];
  return(
    <div style={{padding:16}}>
      <div style={{...s.row(8),marginBottom:12}}>
        <span style={s.badge(phase===1?C.fr:C.gold)}>{phase===1?"📖 1. voor: Loe + tõlgi":"🧠 2. voor: Päheoppimine"}</span>
        <span style={s.badge(C.muted)}>{li+1}/{sel.lines.length}</span>
      </div>
      <div style={s.card({marginBottom:12})}>
        <div style={{fontSize:11,color:C.muted,marginBottom:6}}>{line.speaker} ütleb:</div>
        {phase===1?(
          <>
            <div style={{fontSize:19,fontWeight:800,color:C.fr,lineHeight:1.4}}>{line.fr}</div>
            {showFr?<div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`,color:C.et,fontSize:14}}>🇪🇪 {line.et}</div>
              :<button style={{...s.btnOut(C.muted),marginTop:8,fontSize:12}} onClick={()=>setShowFr(true)}>👁 Näita tõlget</button>}
          </>
        ):(
          <>
            <div style={{fontSize:17,fontWeight:700,color:C.et,lineHeight:1.4}}>🇪🇪 {line.et}</div>
            <div style={{fontSize:12,color:C.muted,marginTop:6}}>Tõlgi prantsuse keelde 👇</div>
          </>
        )}
      </div>
      <textarea style={{...s.input,minHeight:52,marginBottom:10}} placeholder={phase===1?"Kirjuta eesti tõlge...":"Kirjuta prantsuse keeles..."} value={input} onChange={e=>setInput(e.target.value)}/>
      <div style={{...s.row(8),marginBottom:12}}>
        <button style={s.btn(C.accent)} onClick={check} disabled={loading}>{loading?"⏳...":"✓ Kontrolli"}</button>
        <button style={s.btn(rec?C.red:"#374151")} onClick={startVoice}>{rec?"🔴 Salvestad...":"🎤 Räägi"}</button>
      </div>
      {fb&&<div style={s.card({background:"#1c2128",borderColor:C.purple+"66",marginBottom:12})}>
        <div style={{fontSize:11,color:C.purple,marginBottom:6}}>🤖 Õpetaja:</div>
        <div style={{fontSize:14}}>{fb}</div>
      </div>}
      <div style={s.row(8)}>
        <button style={s.btn("#374151")} onClick={()=>setSel(null)}>← Tagasi</button>
        <button style={s.btn(C.green)} onClick={nextLine}>
          {li<sel.lines.length-1?"Järgmine →":phase===1?"🧠 Alusta päheõppimist →":"✅ Valmis!"}
        </button>
      </div>
    </div>
  );
}

function Listening({chapter}) {
  const [playing,setPlaying]=useState(false);
  const [currentTime,setCurrentTime]=useState(0);
  const [duration,setDuration]=useState(0);
  const [speed,setSpeed]=useState(1);
  const [error,setError]=useState(false);
  const audioRef=useRef(null);

  useEffect(()=>{setPlaying(false);setCurrentTime(0);setDuration(0);setError(false);},[chapter.id]);
  useEffect(()=>{if(audioRef.current)audioRef.current.playbackRate=speed;},[speed]);

  function togglePlay(){
    const a=audioRef.current;if(!a)return;
    if(playing){a.pause();setPlaying(false);}
    else{a.play().then(()=>setPlaying(true)).catch(()=>setError(true));}
  }
  function seek(e){
    const a=audioRef.current;if(!a||!duration)return;
    const rect=e.currentTarget.getBoundingClientRect();
    a.currentTime=((e.clientX-rect.left)/rect.width)*duration;
  }
  function fmt(s){const m=Math.floor(s/60);return`${m}:${String(Math.floor(s%60)).padStart(2,"0")}`;}
  const progress=duration?(currentTime/duration)*100:0;

  return(
    <div style={{padding:16}}>
      <div style={s.card({marginBottom:16})}>
        <div style={{fontWeight:800,fontSize:15,color:C.gold,marginBottom:14}}>🎧 {chapter.title}</div>
        <audio ref={audioRef} src={`${AUDIO_BASE}LECON_${chapter.id}.mp3`}
          onTimeUpdate={e=>setCurrentTime(e.target.currentTime)}
          onLoadedMetadata={e=>setDuration(e.target.duration)}
          onEnded={()=>setPlaying(false)}
          onError={()=>setError(true)} preload="metadata"/>
        {error?(
          <div style={{color:C.red,fontSize:13,padding:"10px 0"}}>
            ❌ Audio faili ei leitud: <code>audio/LECON_{chapter.id}.mp3</code>
          </div>
        ):(
          <>
            <div onClick={seek} style={{height:6,background:C.border,borderRadius:3,cursor:"pointer",marginBottom:8}}>
              <div style={{height:"100%",width:`${progress}%`,background:C.accent,borderRadius:3,transition:"width .1s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:14}}>
              <span>{fmt(currentTime)}</span><span>{fmt(duration)}</span>
            </div>
            <div style={{...s.row(10),justifyContent:"center",marginBottom:14}}>
              <button style={s.btn("#374151")} onClick={()=>{if(audioRef.current)audioRef.current.currentTime-=10;}}>⏮ 10s</button>
              <button style={s.btn(playing?C.red:C.green)} onClick={togglePlay}>{playing?"⏸ Paus":"▶ Mängi"}</button>
              <button style={s.btn("#374151")} onClick={()=>{if(audioRef.current)audioRef.current.currentTime+=10;}}>10s ⏭</button>
            </div>
            <div style={{fontSize:12,color:C.muted,marginBottom:8}}>🎚️ Kiirus:</div>
            <div style={s.row(6)}>
              {[0.5,0.75,1,1.25].map(sp=>(
                <button key={sp} onClick={()=>setSpeed(sp)} style={{...s.btn(speed===sp?C.accent:"#374151",true),minWidth:48}}>{sp}x</button>
              ))}
            </div>
          </>
        )}
      </div>
      <div style={{fontWeight:700,color:C.accent,marginBottom:12}}>📄 Dialoogide tekst</div>
      {chapter.dialogues.map(dlg=>(
        <div key={dlg.id} style={s.card({marginBottom:12})}>
          <div style={{fontWeight:700,color:C.gold,marginBottom:10}}>💬 {dlg.title}</div>
          {dlg.lines.map((line,i)=>(
            <div key={i} style={{padding:"6px 0",borderBottom:i<dlg.lines.length-1?`1px solid ${C.border}`:"none"}}>
              <span style={{color:C.muted,fontSize:11,marginRight:8}}>{line.speaker}:</span>
              <span style={{color:C.fr,fontSize:14}}>{line.fr}</span>
              <div style={{color:C.et,fontSize:12,marginTop:2}}>🇪🇪 {line.et}</div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function Quiz({chapter}) {
  const [qs,setQs]=useState(null);
  const [loading,setLoading]=useState(false);
  const [ans,setAns]=useState({});
  const [done,setDone]=useState(false);
  const [score,setScore]=useState(0);
  async function gen(){
    setLoading(true);setAns({});setDone(false);
    const vocab=chapter.vocabulary.slice(0,12).map(w=>`${w.fr} = ${w.et}`).join("; ");
    const prompt=`Loo 5 valikvastustega küsimust 9-aastasele lapsele prantsuse keele kohta.\nSõnavara: ${vocab}\nTagasta AINULT JSON (ilma markdown-ita):\n[{"q":"küsimus","options":["A","B","C","D"],"answer":"õige valik täpselt nagu options-is"}]`;
    try{const raw=await callClaude([{role:"user",content:prompt}],"Tagasta ainult JSON, mitte midagi muud.");setQs(JSON.parse(raw.replace(/```json|```/g,"").trim()));}
    catch{setQs([]);}
    setLoading(false);
  }
  function submit(){let sc=0;qs.forEach((q,i)=>{if(ans[i]===q.answer)sc++;});setScore(sc);setDone(true);}
  if(!qs)return(
    <div style={{padding:16}}>
      <div style={s.card({textAlign:"center",padding:40})}>
        <div style={{fontSize:48,marginBottom:12}}>🎯</div>
        <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>Viktoriin — Leçon {chapter.id}</div>
        <div style={{color:C.muted,marginBottom:20,fontSize:14}}>Claude genereerib 5 küsimust õpiku materjali põhjal</div>
        <button style={s.btn(C.accent)} onClick={gen} disabled={loading}>{loading?"⏳ Genereerin...":"🚀 Alusta!"}</button>
      </div>
    </div>
  );
  return(
    <div style={{padding:16}}>
      {done&&<div style={s.card({textAlign:"center",marginBottom:20,borderColor:score>=4?C.green:C.gold})}>
        <div style={{fontSize:40}}>{score===5?"🏆":score>=3?"👍":"💪"}</div>
        <div style={{fontSize:26,fontWeight:900,color:score>=4?C.green:C.gold}}>{score}/{qs.length}</div>
        <div style={{color:C.muted,fontSize:13,marginTop:4}}>{score===5?"Suurepärane! 🌟":score>=3?"Väga hea töö!":"Harjuta veel!"}</div>
        <button style={{...s.btn(C.accent),marginTop:14}} onClick={gen}>🔄 Uus viktoriin</button>
      </div>}
      {qs.length===0?<><div style={{color:C.red,marginBottom:12}}>Viga. Proovi uuesti.</div><button style={s.btn(C.accent)} onClick={gen}>Proovi uuesti</button></>
      :qs.map((q,i)=>(
        <div key={i} style={s.card({marginBottom:12})}>
          <div style={{fontWeight:700,marginBottom:12,fontSize:15}}>{i+1}. {q.q}</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {q.options.map(opt=>{
              let bg=C.card,border=C.border;
              if(done){if(opt===q.answer){bg=C.green+"22";border=C.green;}else if(opt===ans[i]&&ans[i]!==q.answer){bg=C.red+"22";border=C.red;}}
              else if(ans[i]===opt){bg=C.accent+"22";border=C.accent;}
              return<button key={opt} disabled={done} onClick={()=>setAns({...ans,[i]:opt})} style={{padding:"10px 12px",borderRadius:8,border:`1px solid ${border}`,background:bg,color:C.text,textAlign:"left",cursor:done?"default":"pointer",fontFamily:"inherit",fontSize:14,transition:"all .15s"}}>{opt}</button>;
            })}
          </div>
        </div>
      ))}
      {!done&&qs.length>0&&<button style={{...s.btn(C.gold),width:"100%",color:"#111"}} onClick={submit} disabled={Object.keys(ans).length<qs.length}>✅ Kontrolli vastuseid ({Object.keys(ans).length}/{qs.length})</button>}
    </div>
  );
}

const TABS=[{id:"flash",label:"🃏 Sõnad"},{id:"dlg",label:"💬 Dialoog"},{id:"listen",label:"🔊 Kuula"},{id:"quiz",label:"🎯 Viktoriin"}];
const GROUPS=[{label:"41–45",ids:[41,42,43,44,45]},{label:"46–50",ids:[46,47,48,49,50]},{label:"51–55",ids:[51,52,53,54,55]},{label:"56–60",ids:[56,57,58,59,60]}];

function App() {
  const [tab,setTab]=useState("flash");
  const [chIdx,setChIdx]=useState(0);
  const [grpIdx,setGrpIdx]=useState(0);
  const chapter=CHAPTERS[chIdx];
  function selectGroup(gi){setGrpIdx(gi);setChIdx(CHAPTERS.findIndex(c=>c.id===GROUPS[gi].ids[0]));}
  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Nunito',sans-serif",paddingBottom:60}}>
      <div style={{background:"linear-gradient(180deg,#161b22,#0d1117)",borderBottom:`1px solid ${C.border}`,padding:"12px 14px",position:"sticky",top:0,zIndex:100}}>
        <div style={{...s.row(10),marginBottom:10}}>
          <span style={{fontSize:24}}>🇫🇷</span>
          <div>
            <div style={{fontWeight:900,fontSize:16}}>Prantsuse keel – Minu arm</div>
            <div style={{fontSize:11,color:C.muted}}>{chapter.title}</div>
          </div>
        </div>
        <div style={{...s.row(6),marginBottom:8}}>
          {GROUPS.map((g,gi)=>(
            <button key={gi} onClick={()=>selectGroup(gi)} style={{...s.btn(gi===grpIdx?"#bc8cff":"#21262d",true),color:gi===grpIdx?"#fff":C.muted}}>Leç {g.label}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:5,marginBottom:8,overflowX:"auto"}}>
          {GROUPS[grpIdx].ids.map(id=>{
            const ci=CHAPTERS.findIndex(c=>c.id===id);
            return<button key={id} onClick={()=>setChIdx(ci)} style={{...s.btn(chapter?.id===id?C.gold:"#21262d",true),color:chapter?.id===id?"#111":C.muted,whiteSpace:"nowrap"}}>Leç {id}</button>;
          })}
        </div>
        <div style={{display:"flex",gap:5}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${tab===t.id?C.accent:C.border}`,background:tab===t.id?C.accent+"22":"transparent",color:tab===t.id?C.accent:C.muted,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.label}</button>
          ))}
        </div>
      </div>
      {tab==="flash"&&<Flashcards chapter={chapter} key={`f-${chIdx}`}/>}
      {tab==="dlg"&&<Dialogue chapter={chapter} key={`d-${chIdx}`}/>}
      {tab==="listen"&&<Listening chapter={chapter} key={`l-${chIdx}`}/>}
      {tab==="quiz"&&<Quiz chapter={chapter} key={`q-${chIdx}`}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
