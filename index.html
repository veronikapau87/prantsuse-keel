<script type="text/babel">
const {useState,useRef,useEffect}=React;

function speak(text,rate){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="fr-FR";u.rate=rate||globalSpeed;
  const fr=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith("fr"));
  if(fr)u.voice=fr;
  window.speechSynthesis.speak(u);
}
window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

// ─── Heli feedback ────────────────────────────────────────────────────────────
function playSound(type) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if(type==="correct") {
      o.frequency.setValueAtTime(520,ctx.currentTime);
      o.frequency.setValueAtTime(660,ctx.currentTime+0.1);
      o.frequency.setValueAtTime(800,ctx.currentTime+0.2);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
      o.start(); o.stop(ctx.currentTime+0.4);
    } else if(type==="wrong") {
      o.frequency.setValueAtTime(200,ctx.currentTime);
      o.frequency.setValueAtTime(150,ctx.currentTime+0.1);
      g.gain.setValueAtTime(0.2,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start(); o.stop(ctx.currentTime+0.3);
    } else if(type==="levelup") {
      [400,500,600,800].forEach((f,i)=>{
        const o2=ctx.createOscillator(); const g2=ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.frequency.value=f;
        g2.gain.setValueAtTime(0.25,ctx.currentTime+i*0.1);
        g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.15);
        o2.start(ctx.currentTime+i*0.1); o2.stop(ctx.currentTime+i*0.1+0.15);
      });
    }
  } catch(e){}
}

// ─── XP & Tasemed ─────────────────────────────────────────────────────────────
const LEVELS = [
  {min:0,   name:"Algaja",      emoji:"🐣", color:"#94a3b8"},
  {min:20,  name:"Õppur",       emoji:"📚", color:"#3b82f6"},
  {min:60,  name:"Prantsuse sõber", emoji:"🥐", color:"#f59e0b"},
  {min:120, name:"Pariislane",  emoji:"🗼", color:"#8b5cf6"},
  {min:200, name:"Meister",     emoji:"⭐", color:"#ef4444"},
];
function getLevel(xp) {
  let lv = LEVELS[0];
  for(const l of LEVELS) { if(xp>=l.min) lv=l; }
  return lv;
}
function getNextLevel(xp) {
  for(const l of LEVELS) { if(xp<l.min) return l; }
  return null;
}

// ─── XP popup ─────────────────────────────────────────────────────────────────
function XpPopup({xp, color}) {
  return (
    <div style={{position:"fixed",top:"40%",left:"50%",transform:"translateX(-50%)",
      background:color,color:"#fff",borderRadius:20,padding:"8px 20px",
      fontSize:20,fontWeight:900,zIndex:9999,pointerEvents:"none",
      animation:"xpPop 1s ease forwards"}}>
      +{xp} XP ✨
    </div>
  );
}

// ─── Konfetti ─────────────────────────────────────────────────────────────────
function Confetti() {
  const pieces = ["⭐","🌟","✨","🎉","🎊","💫","🏆"];
  return (
    <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:9998,overflow:"hidden"}}>
      {Array.from({length:12}).map((_,i)=>(
        <div key={i} style={{
          position:"absolute",
          left:`${10+i*7}%`,
          top:"30%",
          fontSize:`${16+Math.random()*16}px`,
          animation:`confetti ${0.6+Math.random()*0.8}s ease forwards`,
          animationDelay:`${i*0.06}s`
        }}>{pieces[i%pieces.length]}</div>
      ))}
    </div>
  );
}

// ─── Progress bar komponent ────────────────────────────────────────────────────
function LevelBar({xp, color}) {
  const lv = getLevel(xp);
  const next = getNextLevel(xp);
  const pct = next ? Math.round(((xp-lv.min)/(next.min-lv.min))*100) : 100;
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 14px",background:"#fff",borderBottom:"1px solid #f3f4f6"}}>
      <span style={{fontSize:18}}>{lv.emoji}</span>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:700,marginBottom:3}}>
          <span style={{color:lv.color}}>{lv.name}</span>
          <span style={{color:"#9ca3af"}}>{xp} XP {next?`→ ${next.min}`:""}</span>
        </div>
        <div style={{height:6,background:"#e5e7eb",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${lv.color},${color})`,borderRadius:3,transition:"width .5s"}}/>
        </div>
      </div>
      {next&&<span style={{fontSize:11,color:"#9ca3af"}}>{next.emoji}</span>}
    </div>
  );
}

        {speaker:"Jean",fr:"Les contes de Charles Perrault \"Le Petit Chaperon Rouge\" et \"Le Chat Botté\".",et:"Charles Perrault' muinasjutte \"Punamütsike\" ja \"Saabastega kass\"."},
        {speaker:"Pierre",fr:"Tu as mauvais goût. Moi, je préfère \"Les lettres de mon moulin\". Alors, tu viens ou tu ne viens pas?",et:"Sul on halb maitse. Mina eelistan \"Kirju mu veskilt\". No nii, kas sa tuled või ei tule?"},
        {speaker:"Jean",fr:"D'accord. On va où?",et:"Nõus. Kuhu siis läheme?"},
        {speaker:"Pierre",fr:"Aux champs.",et:"Põldudele."},
        {speaker:"Jean",fr:"Aux Champs-Élysées?",et:"Elüüsiumi väljadele?"},
        {speaker:"Pierre",fr:"Bien sûr!",et:"Muidugi!"},
      ]},

      {fr:"je n'aime pas",et:"mulle ei meeldi",ex:"Je n'aime pas les tulipes."},
    ],
    dialogues:[
      {id:11,title:"Kevadlilled",lines:[
        {speaker:"A",fr:"Aimes-tu le printemps?",et:"Kas sa armastad kevadet?"},
        {speaker:"B",fr:"Bien sûr.",et:"Muidugi."},
        {speaker:"A",fr:"Mais pourquoi aimes-tu le printemps?",et:"Aga miks sa armastad kevadet?"},
        {speaker:"B",fr:"Au printemps il fait beau (temps).",et:"Kevadel on ilus ilm."},
        {speaker:"A",fr:"Et alors? En été aussi il fait beau (temps).",et:"Ja mis siis? Suvel on ka ilus ilm."},
        {speaker:"B",fr:"Au printemps il fait du soleil et il fait chaud.",et:"Kevadel paistab päike ja on soe."},
        {speaker:"A",fr:"En été aussi il fait du soleil et il fait chaud.",et:"Suvel on ka päike ja on soe."},
        {speaker:"B",fr:"Au printemps il y a des oiseaux qui chantent.",et:"Kevadel on laulvaid linde."},
        {speaker:"A",fr:"En été aussi il y a des oiseaux.",et:"Suvel on ka linde."},
        {speaker:"B",fr:"Au printemps il y a des fleurs: des violettes, des narcisses, des tulipes.",et:"Kevadel on lilli: kannikesi, nartsisse, tulpe."},
        {speaker:"A",fr:"Moi, je n'aime pas les narcisses et les tulipes. Je préfère les roses et les marguerites.",et:"Mina ei armasta nartsisse ja tulpe. Ma eelistan roose ja karikakraid."},
        {speaker:"B",fr:"Écoute, mon cher (ma chère), tu es difficile!",et:"Kuule, mu kallis, sa oled raske iseloomuga!"},
        {speaker:"A",fr:"Non, je ne suis pas difficile, mais je préfère l'été, car en été il y a des vacances.",et:"Ei, ma pole raske iseloomuga, aga ma eelistan suve, sest suvel on koolivaheaeg."},
      ]},
    ],songs:[{"title": "Adieu, l"hiver!", "type": "luuletus", "emoji": "🌸", "lines": [{"fr": "Adieu, l"hiver.", "et": "Jumalaga, talv."}, {"fr": "Vive le printemps!", "et": "Elagu kevad!"}, {"fr": "Tu vois, mon cher (ma chère),", "et": "Sa näed, mu kallis,"}, {"fr": "il fait beau temps.", "et": "on ilus ilm."}, {"fr": "Bonjour, la reine –", "et": "Tere, kuninganna –"}, {"fr": "ma vieille Cité;", "et": "mu vana Cité,"}, {"fr": "et toi, la Seine!", "et": "ja sina, Seine"i jõgi!"}, {"fr": "Oh, quelle beauté!", "et": "Oo, milline ilu!"}]}],

  {id:49,pic:"🐄🐑🐇🐎",title:"Leçon 49",subtitle:"Taluloomad",emoji:"🐄",color:"#16a34a",
    vocabulary:[
      {fr:"avoir",et:"omama",ex:"J'ai un chat. Tu as un chien."},
      {fr:"j'adore",et:"ma jumaldan",ex:"J'adore les vacances."},
      {fr:"la mer",et:"meri",ex:"J'adore le soleil et la mer."},
      {fr:"la campagne",et:"maa",ex:"Je préfère la campagne."},
      {fr:"la ferme",et:"talu",ex:"Mes grand-parents ont une ferme."},
      {fr:"le chat",et:"kass",ex:"Nous avons deux chats."},
      {fr:"le chien",et:"koer",ex:"Nous avons un chien."},
      {fr:"la vache",et:"lehm",ex:"Nous avons une vache."},
      {fr:"le mouton",et:"lammas",ex:"Nous avons des moutons."},
      {fr:"le lapin",et:"küülik",ex:"Nous avons des lapins."},
      {fr:"le cheval",et:"hobune",ex:"J'adore les chevaux."},
    ],
    dialogues:[
      {id:13,title:"Avez-vous des animaux?",lines:[
        {speaker:"A",fr:"Aimes-tu les vacances?",et:"Kas sa armastad koolivaheaega?"},
        {speaker:"B",fr:"J'adore les vacances: le soleil et la mer.",et:"Ma jumaldan koolivaheaega: päikest ja merd."},
        {speaker:"A",fr:"Moi, je préfère la campagne.",et:"Mina eelistan maaelu."},
        {speaker:"A",fr:"Avez-vous une ferme à la campagne?",et:"Kas teil on maal talu?"},
        {speaker:"B",fr:"Oui, mes grand-parents ont une toute petite ferme.",et:"Jah, minu vanavanematel on väike talu."},
        {speaker:"A",fr:"Avez-vous des animaux aussi?",et:"Kas teil on ka loomi?"},
        {speaker:"B",fr:"Bien sûr. Nous avons deux chats et un chien.",et:"Muidugi. Meil on kaks kassi ja koer."},
        {speaker:"A",fr:"Et c'est tout?",et:"Ja ongi kõik?"},
        {speaker:"B",fr:"Mais non. Nous avons encore une vache, des moutons, des lapins, des oies, des poules et un coq.",et:"Ei muidugi. Meil on veel lehm, lambad, küülikud, haned, kanad ja kukk."},
        {speaker:"A",fr:"Avez-vous un cheval ou un âne?",et:"Kas teil on hobune või eesel?"},
        {speaker:"B",fr:"Non. Mes grand-parents ont un petit tracteur et une voiture.",et:"Ei. Minu vanavanematel on väike traktor ja auto."},
        {speaker:"A",fr:"Alors ce n'est pas intéressant. Moi, j'adore les chevaux.",et:"Siis pole see huvitav. Mina jumaldan hobuseid."},
      ]},
    ],
  },
  {id:50,pic:"🐱🐢 — ❤️",title:"Leçon 50",subtitle:"C'est la vie!",emoji:"🐱",color:"#7c3aed",
    vocabulary:[
      {fr:"s'appeler",et:"nime kandma",ex:"Je m'appelle Marie."},
      {fr:"Comment t'appelles-tu?",et:"Mis su nimi on?",ex:"Je m'appelle Pierre."},
      {fr:"la tortue",et:"kilpkonn",ex:"J'ai une tortue qui s'appelle Framboise."},
      {fr:"C'est la vie!",et:"Elu on juba selline!",ex:"C'est la vie!"},
      {fr:"Oh, pardon!",et:"Oh, vabandust!",ex:"Oh, pardon, mademoiselle!"},
      {fr:"n'est-ce pas?",et:"eks ole?",ex:"Tu as un chat, n'est-ce pas?"},
    ],
    dialogues:[
      {id:14,title:"C'est la vie! — Pierre ja Marie",lines:[
        {speaker:"Pierre",fr:"Oh, pardon, mademoiselle!",et:"Oh, vabandust, preili!"},
        {speaker:"Marie",fr:"Oh, pardon, monsieur!",et:"Oh, vabandust, härra!"},
        {speaker:"Pierre",fr:"Tu t'appelles comment?",et:"Mis su nimi on?"},
        {speaker:"Marie",fr:"Je m'appelle Marie. Et toi, tu t'appelles comment?",et:"Minu nimi on Marie. Ja sina, mis su nimi on?"},
        {speaker:"Pierre",fr:"Moi, je m'appelle Pierre.",et:"Mina, minu nimi on Pierre."},
        {speaker:"Pierre",fr:"Tu as un chat, n'est-ce pas?",et:"Sul on kass, eks ole?"},
        {speaker:"Marie",fr:"Oui, j'ai un chat qui s'appelle Minet.",et:"Jah, mul on kass, keda kutsutakse Minet'ks."},
        {speaker:"Pierre",fr:"Moi aussi, j'ai un chat qui s'appelle Minet.",et:"Minal ka on kass, keda kutsutakse Minet'ks."},
        {speaker:"Pierre",fr:"Moi, j'ai un chien qui s'appelle Riquet.",et:"Mul on koer, keda kutsutakse Riquet'ks."},
        {speaker:"Marie",fr:"Mon Dieu! Moi aussi, j'ai un chien qui s'appelle Riquet.",et:"Issand jumal! Minal ka on koer, keda kutsutakse Riquet'ks."},
        {speaker:"Pierre",fr:"Moi, j'ai encore une tortue qui s'appelle Framboise.",et:"Mul on veel kilpkonn, keda kutsutakse Framboise'ks."},
        {speaker:"Marie",fr:"Mon Dieu! Moi aussi, j'ai une tortue qui s'appelle Framboise!",et:"Issand jumal! Minal ka on kilpkonn, keda kutsutakse Framboise'ks!"},
        {speaker:"Pierre",fr:"Moi, j'ai une sœur qui s'appelle Marie Dubois.",et:"Mul on õde, kelle nimi on Marie Dubois."},
        {speaker:"Marie",fr:"Et moi, j'ai un frère qui s'appelle Pierre Dubois.",et:"Ja minal on vend, kelle nimi on Pierre Dubois."},
        {speaker:"Pierre",fr:"Bonjour, ma sœur Marie!",et:"Tere, mu õde Marie!"},
        {speaker:"Marie",fr:"Bonjour, mon frère Pierre!",et:"Tere, mu vend Pierre!"},
        {speaker:"Koos",fr:"C'est la vie!",et:"Selline on elu!"},
      ]},
    ],songs:[{"title": "Le tréma et la virgule", "type": "luuletus", "emoji": "📝", "lines": [{"fr": "Le tréma et la virgule,", "et": "Treema ja koma,"}, {"fr": "tous les deux sont ridicules.", "et": "mõlemad on naeruväärsed."}, {"fr": "Le point et l"apostrophe", "et": "Punkt ja ülakoma"}, {"fr": "sont sérieux comme notre prof.", "et": "on tõsised nagu meie õpetaja."}]}],

    dialogues:[
      {id:15,title:"Bon appétit!",lines:[
        {speaker:"Madeleine",fr:"Allô! François?",et:"Hallo! François?"},
        {speaker:"François",fr:"Salut, Madeleine!",et:"Tervist, Madeleine!"},
        {speaker:"Madeleine",fr:"Comment vas-tu?",et:"Kuidas sul läheb?"},
        {speaker:"François",fr:"Je vais bien, merci.",et:"Mul läheb hästi, tänan."},
        {speaker:"Madeleine",fr:"Et ton chat Minet, comment va-t-il?",et:"Ja sinu kass Minet, kuidas temal läheb?"},
        {speaker:"François",fr:"Il va bien, lui aussi.",et:"Temal läheb ka hästi."},
        {speaker:"Madeleine",fr:"Qu'est-ce qu'il fait?",et:"Mida ta teeb?"},
        {speaker:"François",fr:"Il attrape des souris.",et:"Ta püüab hiiri."},
        {speaker:"Madeleine",fr:"Et toi, qu'est-ce que tu fais?",et:"Ja sina, mida sa teed?"},
        {speaker:"François",fr:"Je mange.",et:"Ma söön."},
        {speaker:"Madeleine",fr:"Des souris?",et:"Hiiri?"},
        {speaker:"François",fr:"Non. Je mange du pain et de la confiture.",et:"Ei. Ma söön leiba moosiga."},
        {speaker:"Madeleine",fr:"Alors, bon appétit!",et:"Siis head isu!"},
        {speaker:"François",fr:"Merci, mon ami.",et:"Tänan, mu sõber."},
        {speaker:"Madeleine",fr:"Pas de quoi.",et:"Pole tänu väärt."},
      ]},
    ],
  },
  {id:52,pic:"🛁🧼🐷",title:"Leçon 52",subtitle:"Kuidas sa end pesed?",emoji:"🐷",color:"#db2777",
    vocabulary:[
      {fr:"se laver",et:"(ennast) pesema",ex:"Je me lave. Tu te laves."},
      {fr:"je me lave",et:"ma pesen ennast",ex:"Je me lave avec du savon."},
      {fr:"l'eau chaude",et:"soe vesi",ex:"Je me lave à l'eau chaude."},
      {fr:"l'eau froide",et:"külm vesi",ex:"Je n'aime pas l'eau froide."},
      {fr:"le savon",et:"seep",ex:"Je me lave avec du savon."},
      {fr:"sale",et:"must / räpane",ex:"Tu es sale comme un cochon."},
      {fr:"le cochon",et:"siga",ex:"Sale comme un cochon."},
    ],
    dialogues:[
      {id:16,title:"Tu te laves comment?",lines:[
        {speaker:"A",fr:"Tu te laves comment?",et:"Kuidas sa end pesed?"},
        {speaker:"B",fr:"Je me lave avec les mains.",et:"Ma pesen end kätega."},
        {speaker:"A",fr:"Bien sûr. Mais tu te laves à l'eau chaude ou à l'eau froide?",et:"Muidugi. Aga kas sa pesed end sooja või külma veega?"},
        {speaker:"B",fr:"Je me lave à l'eau chaude.",et:"Ma pesen end sooja veega."},
        {speaker:"A",fr:"Pourquoi à l'eau chaude?",et:"Miks sooja veega?"},
        {speaker:"B",fr:"Je n'aime pas le froid.",et:"Ma ei armasta külma."},
        {speaker:"A",fr:"Mais tu te laves à l'eau chaude comment?",et:"Aga kuidas sa end sooja veega pesed?"},
        {speaker:"B",fr:"Comment, comment! Laisse-moi tranquille! Je me lave et c'est tout!",et:"Kuidas, kuidas! Jäta mind rahule! Ma pesen end ja ongi kõik!"},
        {speaker:"A",fr:"Mais moi, je me lave avec du savon, voilà comme je suis!",et:"Aga mina pesen end seebiga, näe missugune ma olen!"},
        {speaker:"B",fr:"Toi? Avec du savon!?",et:"Sina? Seebiga!?"},
        {speaker:"A",fr:"Bien sûr!",et:"Muidugi!"},
        {speaker:"B",fr:"Mais pourquoi es-tu sale comme un cochon?",et:"Aga miks sa oled siis must nagu siga?"},
      ]},
    ],
  },
  {id:53,pic:"🐱🐶🎵",title:"Leçon 53",subtitle:"Lemmikloomad",emoji:"🐱",color:"#16a34a",
    vocabulary:[
      {fr:"l'animal préféré",et:"lemmikloom",ex:"Quel est ton animal préféré?"},
      {fr:"se laver eux-mêmes",et:"pesevad end ise",ex:"Les chats se lavent eux-mêmes."},

      {fr:"préféré(e)",et:"lemmik-",ex:"Mon animal préféré est le chat."},

    dialogues:[
      {id:17,title:"Quel est ton animal préféré?",lines:[
        {speaker:"A",fr:"Quel est ton animal préféré?",et:"Milline on sinu lemmikloom?"},
        {speaker:"B",fr:"Le chat.",et:"Kass."},
        {speaker:"A",fr:"Et tu as un chat, toi?",et:"Ja sul on kass, sinu käes?"},
        {speaker:"B",fr:"Oui, j'ai un chat qui s'appelle Minet.",et:"Jah, mul on kass, keda kutsutakse Minet'ks."},
        {speaker:"A",fr:"Mais pourquoi aimes-tu les chats? Moi, je préfère les chiens.",et:"Aga miks sa kasse armastad? Mina eelistan koeri."},
        {speaker:"B",fr:"Moi, je préfère les chats, car les chats se lavent eux-mêmes (seuls).",et:"Mina eelistan kasse, sest kassid pesevad end ise (iseseisvalt)."},
        {speaker:"A",fr:"Et ton chat Minet, il se lave aussi lui-même (tout seul)?",et:"Ja sinu kass Minet, ta peseb ka end ise?"},
        {speaker:"B",fr:"Mais oui.",et:"Muidugi küll."},
        {speaker:"A",fr:"Il se lave comment?",et:"Kuidas ta end peseb?"},
        {speaker:"B",fr:"C'est très simple. Il mange du savon, puis il se lave avec sa langue et sa patte.",et:"See on väga lihtne. Ta sööb seepi, siis peseb end keele ja käpaga."},
      ]},

async function callClaude(messages,system){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages}),
    });
    const d=await res.json();
    if(d.error)return null;
    return d.content?.[0]?.text||null;
  }catch(e){return null;}
}

// ─── Global speed state ───────────────────────────────────────────────────────
let globalSpeed = 1;
const speedListeners = new Set();
function setGlobalSpeed(sp) {
  globalSpeed = sp;
  speedListeners.forEach(fn => fn(sp));
}

function SpeedBar({color}) {
  const [sp, setSp] = React.useState(globalSpeed);
  React.useEffect(() => {
    speedListeners.add(setSp);
    return () => speedListeners.delete(setSp);
  }, []);
  return (
    <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center"}}>
      <span style={{fontSize:12,color:"#9ca3af",fontWeight:700}}>🎚️</span>
      {[0.5,0.75,1,1.25].map(s=>(
        <button key={s} className="btn btn-sm"
          style={{background:sp===s?color:"#f3f4f6",color:sp===s?"#fff":"#6b7280",padding:"3px 10px",fontSize:11}}
          onClick={()=>setGlobalSpeed(s)}>{s}x</button>
      ))}
    </div>
  );
}

function Flashcards({chapter, onXp}){
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [known,setKnown]=useState(new Set());
  const [showEx,setShowEx]=useState(false);
  const w=chapter.vocabulary[idx];
  const C=chapter.color;
  const pct=Math.round((known.size/chapter.vocabulary.length)*100);

  const [flashFb, setFlashFb] = useState(null); // "correct" | "wrong"

  function next(mark){
    if(mark){
      setKnown(k=>new Set([...k,idx]));
      setFlashFb("correct");
      playSound("correct");
      if(onXp) onXp(5, chapter.color);
    } else {
      setFlashFb("wrong");
      playSound("wrong");
    }
    setTimeout(()=>setFlashFb(null),400);
    setFlipped(false);setShowEx(false);
    setTimeout(()=>setIdx(i=>(i+1)%chapter.vocabulary.length),150);
  }

  return(
    <div style={{padding:16,maxWidth:500,margin:"0 auto"}}>
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>
          <span>{idx+1}/{chapter.vocabulary.length}</span>
          <span style={{color:C}}>{known.size} õpitud ({pct}%)</span>
        </div>
        <div style={{height:8,background:"#e5e7eb",borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:C,borderRadius:4,transition:"width .4s"}}/>
        </div>
      </div>

      <div style={{textAlign:"center",marginBottom:12,padding:"14px 0",background:`linear-gradient(135deg,${C}10,${C}05)`,borderRadius:16,border:`1.5px dashed ${C}40`}}>
        <div style={{fontSize:42,lineHeight:1.2,marginBottom:4}}>{chapter.pic||chapter.emoji}</div>
        <div style={{fontSize:13,fontWeight:700,color:C}}>{chapter.subtitle}</div>
      </div>
      <SpeedBar color={C}/>

      <div onClick={()=>setFlipped(!flipped)}
        className={flashFb==="wrong"?"shake":flashFb==="correct"?"correct":""}
        style={{
        background:flashFb==="correct"?"#dcfce7":flashFb==="wrong"?"#fee2e2":flipped?`linear-gradient(135deg,${C}18,${C}28)`:"linear-gradient(135deg,#fff,#f8faff)",
        border:`3px solid ${flashFb==="correct"?"#16a34a":flashFb==="wrong"?"#ef4444":flipped?C:"#e5e7eb"}`,
        borderRadius:24,padding:32,textAlign:"center",cursor:"pointer",
        minHeight:190,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:10,
        boxShadow:flipped?`0 8px 28px ${C}28`:"0 4px 18px rgba(0,0,0,.06)",
        transition:"all .25s",userSelect:"none",
      }}>
        <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",color:"#9ca3af",fontWeight:700}}>
          {flipped?"🇪🇪 Eesti keeles":"🇫🇷 Prantsuse keeles"}
        </div>
        <div style={{fontSize:28,fontWeight:800,color:flipped?C:"#1f2937",lineHeight:1.2}}>
          {flipped?w.et:w.fr}
        </div>
        {!flipped&&<div style={{fontSize:12,color:"#9ca3af"}}>👆 klõpsa tõlke nägemiseks</div>}
      </div>

      <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
        <button className="btn btn-sm" style={{background:C,color:"#fff"}} onClick={e=>{e.stopPropagation();speak(w.fr,globalSpeed);}}>🔊 Kuula</button>
        {w.ex&&<button className="btn btn-sm" style={{background:"#f3f4f6",color:"#374151"}} onClick={()=>setShowEx(!showEx)}>
          📝 {showEx?"Peida":"Näitelause"}
        </button>}
      </div>

      {showEx&&<div style={{marginTop:10,background:`${C}12`,border:`2px solid ${C}30`,borderRadius:14,padding:12}}>
        <div style={{fontSize:14,color:"#1f2937",fontWeight:600}}>{w.ex}</div>
        <button className="btn btn-sm" style={{background:C,color:"#fff",marginTop:8}} onClick={()=>speak(w.ex,globalSpeed)}>🔊 Kuula lauset</button>
      </div>}

      <div style={{display:"flex",gap:10,marginTop:14,justifyContent:"center"}}>
        <button className="btn btn-sm" style={{background:"#f3f4f6",color:"#374151"}} onClick={()=>{setFlipped(false);setShowEx(false);setIdx(i=>(i-1+chapter.vocabulary.length)%chapter.vocabulary.length);}}>← Eelmine</button>
        <button className="btn btn-sm" style={{background:"#fee2e2",color:"#b91c1c",fontSize:14}} onClick={()=>next(false)}>🔄 Korda</button>
        <button className="btn btn-sm" style={{background:"#dcfce7",color:"#15803d",fontSize:14}} onClick={()=>next(true)}>⭐ Tean! +5XP</button>
      </div>
    </div>
  );
}

// ─── Dialoog ──────────────────────────────────────────────────────────────────
function Dialogue({chapter, onXp}){
  const [sel,setSel]=useState(null);
  const [mode,setMode]=useState("read"); // read | learn | chat
  const [li,setLi]=useState(0);
  const [showEt,setShowEt]=useState(false);
  const [rec,setRec]=useState(false);
  const [recText,setRecText]=useState("");
  const [fb,setFb]=useState(null);
  const [fbOk,setFbOk]=useState(null); // true/false/null
  const [loading,setLoading]=useState(false);
  const [playing,setPlaying]=useState(false);
  const [hlIdx,setHlIdx]=useState(null);
  // Chat mode state
  const [chatRole,setChatRole]=useState(1); // which speaker index laps plays (0 or 1)
  const [chatStep,setChatStep]=useState(0);
  const [chatInput,setChatInput]=useState("");
  const [chatHistory,setChatHistory]=useState([]);
  const [chatDone,setChatDone]=useState(false);
  const synth=useRef(window.speechSynthesis);
  const C=chapter.color;

  useEffect(()=>{return()=>synth.current.cancel();},[]);

  function speakLine(text,cb){
    synth.current.cancel();
    setTimeout(()=>{
      const u=new SpeechSynthesisUtterance(text);
      u.lang="fr-FR";u.rate=globalSpeed;
      const fr=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith("fr"));
      if(fr)u.voice=fr;
      if(cb)u.onend=cb;
      synth.current.speak(u);
    },50);
  }

  function playAll(lines){
    synth.current.cancel();setPlaying(true);
    let i=0;
    function next(){
      if(i>=lines.length){setPlaying(false);setHlIdx(null);return;}
      setHlIdx(i);
      const u=new SpeechSynthesisUtterance(lines[i].fr);
      u.lang="fr-FR";u.rate=globalSpeed;
      const fr=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith("fr"));
      if(fr)u.voice=fr;
      u.onend=()=>{i++;setTimeout(next,500);};
      synth.current.speak(u);
    }
    next();
  }
  function stopAll(){synth.current.cancel();setPlaying(false);setHlIdx(null);}

  // ── Mic check — leebe versioon ──
  function checkMicSimple(text, targetFr) {
    // Lihtsustatud kontroll ilma API-ta — võrdle sõnu
    const clean = s => s.toLowerCase().replace(/[^a-zàâäéèêëîïôùûüç\s]/g,'').trim();
    const said = clean(text);
    const target = clean(targetFr);
    const targetWords = target.split(' ');
    const saidWords = said.split(' ');
    const matches = targetWords.filter(w => saidWords.some(s => s.includes(w) || w.includes(s))).length;
    const score = matches / targetWords.length;
    if(score >= 0.6) return {ok:true, msg:"Tubli! 🌟 Kuulsin sind hästi!"};
    if(score >= 0.3) return {ok:true, msg:"Väga hea katse! 👍 Proovi veel kord."};
    return {ok:false, msg:"Proovi uuesti! 💪 Kuula kõigepealt ja siis korda."};
  }

  function checkMic(){
    if(!recText.trim())return;
    const line=sel.lines[li];
    const result = checkMicSimple(recText, line.fr);
    setFb(result.msg);
    setFbOk(result.ok);
    if(result.ok && onXp) onXp(3, C);
  }

  function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Brauser ei toeta kõnetuvastust. Proovi Chrome'i.");return;}
    const r=new SR();r.lang="fr-FR";
    r.onstart=()=>{setRec(true);setRecText("");setFb(null);setFbOk(null);};
    r.onend=()=>setRec(false);
    r.onresult=e=>setRecText(e.results[0][0].transcript);
    r.onerror=()=>{setRec(false);setFb("Mikrofon ei töötanud. Proovi uuesti! 🎤");setFbOk(false);};
    r.start();
  }

  // ── Chat mode ──
  function startChat(dlg) {
    const speakers=[...new Set(dlg.lines.map(l=>l.speaker))];
    const lapsSpeaker=speakers.length>1?speakers[1]:speakers[0];
    // Find first laps line index
    const firstLapsIdx=dlg.lines.findIndex(l=>l.speaker===lapsSpeaker);
    setSel(dlg);
    setMode("chat");
    setChatStep(firstLapsIdx>=0?firstLapsIdx:0); // start at first laps line
    setChatHistory([]);
    setChatDone(false);
    setChatInput("");
    setChatRole(lapsSpeaker);
    // Auto-speak all program lines before first laps line
    let delay=400;
    for(let i=0;i<firstLapsIdx;i++){
      const txt=dlg.lines[i].fr;
      setTimeout(()=>speakLine(txt),delay);
      delay+=1800;
    }
  }

  function chatSubmit() {
    if(!sel||chatDone||!chatInput.trim()) return;
    const speakers=[...new Set(sel.lines.map(l=>l.speaker))];
    const lapsSpeaker=speakers.length>1?speakers[1]:speakers[0];

    // chatStep points to the current LAPS line in sel.lines
    const currentLine=sel.lines[chatStep];
    if(!currentLine||currentLine.speaker!==lapsSpeaker) return;

    const result=checkMicSimple(chatInput,currentLine.fr);
    if(result.ok&&onXp) onXp(5,C);

    // Add laps response to history
    const newHistory=[...chatHistory,
      {speaker:lapsSpeaker,fr:chatInput,correct:result.ok,expected:currentLine.fr,isLaps:true}
    ];

    // Find next line(s) after chatStep
    let nextIdx=chatStep+1;

    // Add all program lines until next laps line (or end)
    const progLines=[];
    while(nextIdx<sel.lines.length && sel.lines[nextIdx].speaker!==lapsSpeaker){
      progLines.push({...sel.lines[nextIdx],isProgram:true,isLaps:false});
      nextIdx++;
    }

    const finalHistory=[...newHistory,...progLines];
    setChatHistory(finalHistory);
    setChatInput("");

    if(nextIdx>=sel.lines.length){
      setChatDone(true);
    } else {
      setChatStep(nextIdx); // points to next laps line
    }

    // Speak program lines
    if(progLines.length>0){
      let delay=300;
      progLines.forEach(pl=>{
        setTimeout(()=>speakLine(pl.fr),delay);
        delay+=1500;
      });
    }
  }

    function startVoiceChat(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Brauser ei toeta kõnetuvastust. Proovi Chrome'i.");return;}
    const r=new SR();r.lang="fr-FR";
    r.onstart=()=>setRec(true);
    r.onend=()=>setRec(false);
    r.onresult=e=>{
      setChatInput(e.results[0][0].transcript);
    };
    r.onerror=()=>setRec(false);
    r.start();
  }

  // ── LIST view ──
  if(!sel)return(
    <div style={{padding:16,maxWidth:500,margin:"0 auto"}}>
      <div style={{textAlign:"center",marginBottom:14,padding:"14px 0",background:`linear-gradient(135deg,${C}10,${C}05)`,borderRadius:16,border:`1.5px dashed ${C}40`}}>
        <div style={{fontSize:42,lineHeight:1.2,marginBottom:4}}>{chapter.pic||chapter.emoji}</div>
        <div style={{fontSize:13,fontWeight:700,color:C}}>{chapter.subtitle}</div>
      </div>
      <SpeedBar color={C}/>
      <p style={{color:"#6b7280",marginBottom:14,fontSize:14}}>Vali dialoog:</p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {chapter.dialogues.map(d=>(
          <div key={d.id} style={{background:"#fff",border:`2px solid #e5e7eb`,borderRadius:18,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,.05)"}}>
            <div style={{fontWeight:800,fontSize:15,color:C,marginBottom:8}}>💬 {d.title}</div>
            <div style={{background:"#f9fafb",borderRadius:10,padding:10,marginBottom:12}}>
              {d.lines.slice(0,3).map((l,i)=>(
                <div key={i} style={{fontSize:12,color:"#374151",marginBottom:3}}>
                  <span style={{color:"#9ca3af",marginRight:5}}>{l.speaker}:</span>
                  <span style={{fontWeight:600}}>{l.fr}</span>
                  <span style={{color:"#f97316",marginLeft:5,fontSize:11}}>— {l.et}</span>
                </div>
              ))}
              {d.lines.length>3&&<div style={{fontSize:11,color:"#9ca3af"}}>... ja veel {d.lines.length-3} repliiki</div>}
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="btn btn-sm" style={{background:C,color:"#fff"}} 
                onClick={()=>{setSel(d);setMode("read");setLi(0);setShowEt(false);setRecText("");setFb(null);}}>
                📖 Loe & kuula
              </button>
              <button className="btn btn-sm" style={{background:"#ea580c",color:"#fff"}}
                onClick={()=>{setSel(d);setMode("learn");setLi(0);setShowEt(false);setRecText("");setFb(null);}}>
                🧠 Õpi pähe
              </button>
              {[...new Set(d.lines.map(l=>l.speaker))].length>1&&(
              <button className="btn btn-sm" style={{background:"#7c3aed",color:"#fff"}}
                onClick={()=>startChat(d)}>
                🎭 Mängi rolli!
              </button>
            )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  const line = sel ? sel.lines[li] : null;

  return(
    <div style={{padding:16,maxWidth:500,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <button className="btn btn-sm" style={{background:"#f3f4f6",color:"#374151"}} onClick={()=>{stopAll();setSel(null);}}>← Tagasi</button>
        <div style={{flex:1,fontWeight:700,color:C,fontSize:14}}>{sel.title}</div>
        {mode!=="chat"&&<>
          <button className="btn btn-sm" style={{background:mode==="read"?C:"#f3f4f6",color:mode==="read"?"#fff":"#374151"}} onClick={()=>{setMode("read");setLi(0);setShowEt(false);setFb(null);}}>📖 Loe</button>
          <button className="btn btn-sm" style={{background:mode==="learn"?"#ea580c":"#f3f4f6",color:mode==="learn"?"#fff":"#374151"}} onClick={()=>{setMode("learn");setLi(0);setShowEt(false);setFb(null);}}>🧠 Õpi</button>
          {[...new Set(sel.lines.map(l=>l.speaker))].length>1&&(
            <button className="btn btn-sm" style={{background:"#7c3aed",color:"#fff"}} onClick={()=>startChat(sel)}>🎭 Mängi</button>
          )}
        </>}
      </div>

      {/* ── READ MODE ── */}
      {mode==="read"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:8}}>
            <SpeedBar color={C}/>
            <button className="btn btn-sm" style={{background:playing?"#ef4444":C,color:"#fff"}} onClick={()=>playing?stopAll():playAll(sel.lines)}>
              {playing?"⏹ Stopp":"▶ Kuula kõik"}
            </button>
          </div>
          <div style={{background:"#fff",borderRadius:20,boxShadow:"0 4px 18px rgba(0,0,0,.07)",overflow:"hidden"}}>
            {sel.lines.map((l,i)=>(
              <div key={i} style={{padding:"12px 16px",borderBottom:i<sel.lines.length-1?"1px solid #f3f4f6":"none",background:hlIdx===i?`${C}12`:"transparent",transition:"background .2s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{marginBottom:4}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#fff",background:C,padding:"2px 8px",borderRadius:8,marginRight:8}}>{l.speaker}</span>
                      <span style={{fontSize:15,fontWeight:700,color:"#1f2937"}}>{l.fr}</span>
                    </div>
                    <div style={{fontSize:13,color:"#ea580c"}}>🇪🇪 {l.et}</div>
                  </div>
                  <button className="btn btn-sm" style={{background:`${C}18`,color:C,flexShrink:0}} onClick={()=>speakLine(l.fr)}>🔊</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── LEARN MODE ── */}
      {mode==="learn"&&line&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:6}}>
            <span style={{background:`${C}18`,color:C,borderRadius:10,padding:"3px 10px",fontSize:12,fontWeight:700}}>🧠 Päheõppimine</span>
            <SpeedBar color={C}/>
            <span style={{fontSize:13,color:"#6b7280"}}>{li+1}/{sel.lines.length}</span>
          </div>
          <div style={{background:"#fff",borderRadius:20,padding:20,boxShadow:"0 4px 18px rgba(0,0,0,.07)",marginBottom:12}}>
            <div style={{fontSize:11,color:"#9ca3af",marginBottom:6}}>{line.speaker} ütleb:</div>
            <div style={{fontSize:20,fontWeight:800,color:"#1f2937",lineHeight:1.4,marginBottom:12}}>{line.fr}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="btn btn-sm" style={{background:C,color:"#fff"}} onClick={()=>speakLine(line.fr)}>🔊 Kuula</button>
              <button className="btn btn-sm" style={{background:"#fff7ed",color:"#c2410c",border:"1px solid #fed7aa"}} onClick={()=>setShowEt(!showEt)}>
                🇪🇪 {showEt?"Peida":"Näita tõlge"}
              </button>
            </div>
            {showEt&&<div style={{marginTop:10,padding:10,background:"#fff7ed",borderRadius:10,fontSize:14,color:"#c2410c",fontWeight:600}}>{line.et}</div>}
          </div>
          <div style={{background:"#fff",borderRadius:20,padding:16,boxShadow:"0 4px 18px rgba(0,0,0,.07)",marginBottom:12}}>
            <div style={{fontSize:13,color:"#6b7280",marginBottom:10}}>🎤 Ütle see lause järele:</div>
            <button className="btn" style={{background:rec?"#ef4444":"#7c3aed",color:"#fff",width:"100%",justifyContent:"center",padding:"12px",fontSize:14}}
              onClick={startVoice}>
              {rec?"🔴 Salvestad...":"🎤 Vajuta ja räägi"}
            </button>
            {recText&&<div style={{marginTop:8,padding:10,background:"#f0fdf4",borderRadius:10,fontSize:13,color:"#15803d"}}>
              ✓ Kuulsin: <strong>{recText}</strong>
            </div>}
            {recText&&!fb&&<button className="btn btn-sm" style={{background:C,color:"#fff",marginTop:8}} onClick={checkMic}>
              ✓ Kontrolli
            </button>}
            {fb&&<div style={{marginTop:10,padding:12,borderRadius:12,fontSize:15,fontWeight:700,
              background:fbOk?"#f0fdf4":"#fff7ed",
              color:fbOk?"#15803d":"#c2410c",
              borderLeft:`4px solid ${fbOk?"#22c55e":"#f97316"}`}}>
              {fb}
            </div>}
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            {li>0&&<button className="btn btn-sm" style={{background:"#f3f4f6",color:"#374151"}} onClick={()=>{setLi(l=>l-1);setShowEt(false);setFb(null);setFbOk(null);setRecText("");}}>← Eelmine</button>}
            <button className="btn btn-sm" style={{background:C,color:"#fff"}}
              onClick={()=>{if(li<sel.lines.length-1){setLi(l=>l+1);setShowEt(false);setFb(null);setFbOk(null);setRecText("");}else setSel(null);}}>
              {li<sel.lines.length-1?"Järgmine →":"✅ Valmis!"}
            </button>
          </div>
        </div>
      )}

      {/* ── CHAT MODE ── */}
      {mode==="chat"&&(
        <div>
          <div style={{background:`linear-gradient(135deg,${C}15,#f5f3ff)`,borderRadius:16,padding:12,marginBottom:14,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:800,color:"#7c3aed"}}>🎭 Rollimäng!</div>
            {(()=>{
              const speakers=[...new Set(sel.lines.map(l=>l.speaker))];
              const lapsSpeaker=speakers.length>1?speakers[1]:speakers[0];
              const progSpeaker=speakers[0];
              return <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>
                Sina oled <strong style={{color:"#7c3aed"}}>{lapsSpeaker}</strong> · Programm mängib <strong style={{color:C}}>{progSpeaker}</strong>
              </div>;
            })()}
          </div>

          {/* Chat history */}
          <div style={{background:"#fff",borderRadius:20,padding:12,boxShadow:"0 4px 18px rgba(0,0,0,.07)",marginBottom:14,minHeight:120}}>
            {/* Show first program line if laps hasn't spoken yet */}
            {chatHistory.length===0&&(()=>{
              const speakers=[...new Set(sel.lines.map(l=>l.speaker))];
              const progSpeaker=speakers[0];
              const lapsSpeaker=speakers.length>1?speakers[1]:speakers[0];
              // Show all program lines before first laps line
              const firstLapsIdx=sel.lines.findIndex(l=>l.speaker===lapsSpeaker);
              const initLines=sel.lines.slice(0,Math.max(firstLapsIdx,1));
              if(initLines.length>0){
                return(<div>{initLines.map((l,i)=>(
                  <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"flex-start"}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#fff",background:C,padding:"2px 8px",borderRadius:8,flexShrink:0}}>{l.speaker}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#1f2937"}}>{l.fr}</div>
                      <div style={{fontSize:12,color:"#9ca3af"}}>{l.et}</div>
                    </div>
                    <button className="btn btn-sm" style={{background:`${C}18`,color:C}} onClick={()=>speakLine(l.fr)}>🔊</button>
                  </div>
                ))}</div>);
              }
            })()}

            {chatHistory.map((h,i)=>{
              const isLaps = !h.isProgram;
              return(
                <div key={i} style={{display:"flex",gap:8,marginBottom:10,alignItems:"flex-start",flexDirection:isLaps?"row-reverse":"row"}}>

                    padding:"2px 8px",borderRadius:8,flexShrink:0}}>{h.speaker}</span>
                  <div style={{flex:1,textAlign:isLaps?"right":"left"}}>

                      {h.fr}
                      {isLaps&&<span style={{marginLeft:6}}>{h.correct?"✓":"✗"}</span>}

                <button className="btn" style={{background:"#7c3aed",color:"#fff",width:"100%",justifyContent:"center",padding:"10px"}} onClick={chatSubmit}>
                  Saada →

              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

function Listening({chapter}){
  const [playingDlg,setPlayingDlg]=useState(null);
  const [hlLine,setHlLine]=useState(null);
  const synth=useRef(window.speechSynthesis);
  const C=chapter.color;
  useEffect(()=>{return()=>synth.current.cancel();},[]);

  function speakWord(text){speak(text,globalSpeed);}

  function speakDlg(dlg){
    synth.current.cancel();setPlayingDlg(dlg.id);
    let i=0;
    function next(){
      if(i>=dlg.lines.length){setPlayingDlg(null);setHlLine(null);return;}
      setHlLine(i);
      const u=new SpeechSynthesisUtterance(dlg.lines[i].fr);
      u.lang="fr-FR";u.rate=globalSpeed;
      const fr=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith("fr"));
      if(fr)u.voice=fr;
      u.onend=()=>{i++;setTimeout(next,600);};
      synth.current.speak(u);
    }
    next();
  }
  function stop(){synth.current.cancel();setPlayingDlg(null);setHlLine(null);}

  return(
    <div style={{padding:16,maxWidth:500,margin:"0 auto"}}>
      <div style={{textAlign:"center",marginBottom:14,padding:"14px 0",background:`linear-gradient(135deg,${C}10,${C}05)`,borderRadius:16,border:`1.5px dashed ${C}40`}}>
        <div style={{fontSize:42,lineHeight:1.2,marginBottom:4}}>{chapter.pic||chapter.emoji}</div>
        <div style={{fontSize:13,fontWeight:700,color:C}}>{chapter.subtitle}</div>
      </div>
      <SpeedBar color={C}/>

      <div style={{background:"#fff",borderRadius:18,padding:16,boxShadow:"0 4px 18px rgba(0,0,0,.06)",marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:15,color:C,marginBottom:12}}>🔤 Sõnavara hääldus</div>
        {chapter.vocabulary.map((w,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<chapter.vocabulary.length-1?"1px solid #f9fafb":"none"}}>
            <div>
              <span style={{fontWeight:800,fontSize:15,color:"#1f2937"}}>{w.fr}</span>
              <span style={{color:"#9ca3af",fontSize:13,marginLeft:8}}>= {w.et}</span>
            </div>
            <button className="btn btn-sm" style={{background:`${C}18`,color:C}} onClick={()=>speakWord(w.fr)}>🔊</button>
          </div>
        ))}
      </div>

      <div style={{fontWeight:800,fontSize:15,color:C,marginBottom:12}}>💬 Dialoogid</div>
      {chapter.dialogues.map(dlg=>(
        <div key={dlg.id} style={{background:"#fff",borderRadius:18,padding:16,boxShadow:"0 4px 18px rgba(0,0,0,.06)",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:800,color:C}}>{dlg.title}</div>
            <button className="btn btn-sm" style={{background:playingDlg===dlg.id?"#ef4444":C,color:"#fff"}}
              onClick={()=>playingDlg===dlg.id?stop():speakDlg(dlg)}>
              {playingDlg===dlg.id?"⏹ Stopp":"▶ Kuula kõik"}
            </button>
          </div>
          {dlg.lines.map((line,i)=>(
            <div key={i} style={{
              padding:"10px 12px",borderRadius:14,marginBottom:6,
              background:hlLine===i&&playingDlg===dlg.id?`${C}15`:"#f9fafb",
              border:`2px solid ${hlLine===i&&playingDlg===dlg.id?C:"transparent"}`,
              transition:"all .2s"
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div style={{flex:1}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#fff",background:C,padding:"1px 7px",borderRadius:8,marginRight:8}}>{line.speaker}</span>
                  <span style={{fontSize:14,fontWeight:700,color:"#1f2937"}}>{line.fr}</span>
                  <div style={{fontSize:12,color:"#ea580c",marginTop:4}}>🇪🇪 {line.et}</div>
                </div>
                <button className="btn btn-sm" style={{background:`${C}18`,color:C,flexShrink:0}} onClick={()=>speakWord(line.fr)}>🔊</button>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ─── Viktoriin ────────────────────────────────────────────────────────────────
function Quiz({chapter, onXp}){
  const [qs,setQs]=useState(null);
  const [loading,setLoading]=useState(false);
  const [ans,setAns]=useState({});
  const [done,setDone]=useState(false);
  const [score,setScore]=useState(0);
  const [ansAnim,setAnsAnim]=useState({}); // track animation per question
  const C=chapter.color;

  function makeFallback(){
    const vocab=chapter.vocabulary;
    return vocab.slice(0,5).map(w=>{
      const wrong=vocab.filter(x=>x.fr!==w.fr).map(x=>x.et).slice(0,3);
      const opts=[w.et,...wrong].sort(()=>Math.random()-.5).slice(0,4);
      return{q:`Mis tähendab prantsuse keeles "${w.fr}"?`,options:opts,answer:w.et};
    });
  }

  function gen(){
    setLoading(true);setAns({});setDone(false);setQs(null);
    setTimeout(()=>{
      const vocab=chapter.vocabulary;
      const pool=[];
      vocab.forEach(w=>{
        const wrongEt=vocab.filter(x=>x.fr!==w.fr).map(x=>x.et).sort(()=>Math.random()-.5).slice(0,3);
        if(wrongEt.length>=3) pool.push({q:`Mis tahendab "${w.fr}"?`,options:[w.et,...wrongEt].sort(()=>Math.random()-.5),answer:w.et});
        const wrongFr=vocab.filter(x=>x.et!==w.et).map(x=>x.fr).sort(()=>Math.random()-.5).slice(0,3);
        if(wrongFr.length>=3) pool.push({q:`Kuidas on eesti keeles "${w.fr}"?`,options:[w.et,...wrongEt].sort(()=>Math.random()-.5),answer:w.et});
      });
      const shuffled=pool.sort(()=>Math.random()-.5).slice(0,5);
      setQs(shuffled.length>=3?shuffled:makeFallback());
      setLoading(false);
    },300);
  }

  function submit(){
    let sc=0;qs.forEach((q,i)=>{if(ans[i]===q.answer)sc++;});
    setScore(sc);setDone(true);
    const xpEarned = sc*10;
    if(onXp && xpEarned>0) onXp(xpEarned, C);
    if(sc>=4) playSound("levelup"); else if(sc>0) playSound("correct");
  }

  function selectAnswer(qi, opt) {
    if(done) return;
    const q = qs[qi];
    const correct = opt === q.answer;
    playSound(correct ? "correct" : "wrong");
    setAnsAnim(prev=>({...prev,[qi]:correct?"correct":"wrong"}));
    setTimeout(()=>setAnsAnim(prev=>({...prev,[qi]:null})),400);
    setAns(prev=>({...prev,[qi]:opt}));
  }

  if(!qs)return(
    <div style={{padding:16,maxWidth:500,margin:"0 auto"}}>
      <div style={{background:"#fff",borderRadius:24,padding:40,textAlign:"center",boxShadow:"0 4px 18px rgba(0,0,0,.07)"}}>
        <div style={{fontSize:64,marginBottom:14}}>🎯</div>
        <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:22,fontWeight:800,color:"#1f2937",marginBottom:6}}>Viktoriin!</div>
        <div style={{fontSize:14,color:C,fontWeight:700,marginBottom:4}}>{chapter.title} — {chapter.subtitle}</div>
        <div style={{color:"#6b7280",marginBottom:24,fontSize:14}}>5 küsimust sõnavara kohta</div>
        <button className="btn" style={{background:C,color:"#fff",fontSize:16,padding:"14px 32px",borderRadius:14}} onClick={gen} disabled={loading}>
          {loading?"⏳ Genereerin...":"🚀 Alusta!"}
        </button>
      </div>
    </div>
  );

  return(
    <div style={{padding:16,maxWidth:500,margin:"0 auto"}}>
      {done&&(
        <div style={{background:"#fff",borderRadius:24,padding:28,textAlign:"center",boxShadow:"0 4px 18px rgba(0,0,0,.07)",marginBottom:20,border:`3px solid ${score>=4?"#16a34a":"#d97706"}`}}>
          <div style={{fontSize:54}}>{score===5?"🏆":score>=4?"🌟":score>=3?"👍":"💪"}</div>
          <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:36,fontWeight:800,color:score>=4?"#16a34a":"#d97706"}}>{score}/{qs.length}</div>
          <div style={{fontSize:15,color:"#374151",marginTop:6}}>
            {score===5?"Suurepärane! Kõik õige! 🎉":score>=4?"Väga hea töö! ⭐":score>=3?"Hästi tehtud! 👏":"Harjuta veel! 💪"}
          </div>
          <button className="btn" style={{background:C,color:"#fff",marginTop:16,padding:"10px 24px"}} onClick={gen}>🔄 Uus viktoriin</button>
        </div>
      )}
      {qs.map((q,qi)=>(
        <div key={qi} style={{background:"#fff",borderRadius:20,padding:18,boxShadow:"0 4px 14px rgba(0,0,0,.06)",marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:15,color:"#1f2937",marginBottom:14}}>
            <span style={{color:C,marginRight:6}}>{qi+1}.</span>{q.q}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {q.options.map(opt=>{
              let bg="#f9fafb",border="#e5e7eb",tc="#374151";
              const isSelected=ans[qi]===opt;
              const isAnim=ansAnim[qi]===opt;
              if(done){
                if(opt===q.answer){bg="#dcfce7";border="#16a34a";tc="#15803d";}
                else if(ans[qi]===opt&&ans[qi]!==q.answer){bg="#fee2e2";border="#ef4444";tc="#b91c1c";}
              }else if(isSelected){bg=`${C}15`;border=C;tc=C;}
              return(
                <button key={opt} disabled={done}
                  className={isAnim?(ansAnim[qi]==="correct"?"correct":"shake"):""}
                  onClick={()=>selectAnswer(qi,opt)}
                  style={{padding:"12px 16px",borderRadius:12,border:`2px solid ${border}`,background:bg,color:tc,
                    textAlign:"left",cursor:done?"default":"pointer",fontFamily:"'Nunito',sans-serif",
                    fontSize:14,fontWeight:600,transition:"background .2s,border .2s"}}>
                  {done&&opt===q.answer?"✓ ":""}{done&&ans[qi]===opt&&ans[qi]!==q.answer?"✗ ":""}{opt}
                </button>
              );
            })}
          </div>
        </div>
      ))}
      {!done&&<button className="btn" style={{background:C,color:"#fff",width:"100%",justifyContent:"center",padding:"14px",fontSize:15,borderRadius:14}}
        onClick={submit} disabled={Object.keys(ans).length<qs.length}>
        ✅ Kontrolli vastuseid ({Object.keys(ans).length}/{qs.length})
      </button>}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
const TABS=[{id:"flash",label:"🃏 Sõnad"},{id:"dlg",label:"💬 Dialoog"},{id:"listen",label:"🔊 Kuula"},{id:"songs",label:"🎵 Laulud"},{id:"quiz",label:"🎯 Viktoriin"}];
const GROUPS=[{label:"41–45",ids:[41,42,43,44,45]},{label:"46–50",ids:[46,47,48,49,50]},{label:"51–55",ids:[51,52,53,54,55]},{label:"56–60",ids:[56,57,58,59,60]}];

function App(){
  const [tab,setTab]=useState("flash");
  const [chIdx,setChIdx]=useState(0);
  const [grpIdx,setGrpIdx]=useState(0);
  const [xp,setXp]=useState(()=>parseInt(localStorage.getItem("fr_xp")||"0"));
  const [showConf,setShowConf]=useState(false);
  const [xpPopup,setXpPopup]=useState(null);
  const ch=CHAPTERS[chIdx];

  function addXp(amount, color) {
    setXp(prev=>{
      const next=prev+amount;
      localStorage.setItem("fr_xp",next);
      const wasLv=getLevel(prev); const nowLv=getLevel(next);
      if(nowLv.min>wasLv.min){playSound("levelup");setShowConf(true);setTimeout(()=>setShowConf(false),2000);}
      return next;
    });
    setXpPopup({amount,color});
    setTimeout(()=>setXpPopup(null),1000);
  }

  function selectGroup(gi){setGrpIdx(gi);setChIdx(CHAPTERS.findIndex(c=>c.id===GROUPS[gi].ids[0]));}

  return(
    <div style={{minHeight:"100vh",background:"#fff9f0"}}>
      {/* Header */}
      <div style={{background:"#fff",boxShadow:"0 2px 16px rgba(0,0,0,.08)",position:"sticky",top:0,zIndex:100}}>
        <div style={{padding:"12px 16px 8px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid #f3f4f6"}}>
          <FrenchFlag/>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:800,fontSize:18,color:"#1f2937",lineHeight:1}}>Prantsuse keel 🇫🇷</div>
            <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{ch.emoji} {ch.title} — {ch.subtitle}</div>
          </div>
          <EiffelTower/>
        </div>

        {/* Grupid */}
        <div style={{display:"flex",gap:6,padding:"8px 14px",overflowX:"auto",borderBottom:"1px solid #f3f4f6"}}>
          {GROUPS.map((g,gi)=>(
            <button key={gi} className="btn btn-sm"
              style={{background:gi===grpIdx?ch.color:"#f3f4f6",color:gi===grpIdx?"#fff":"#6b7280",whiteSpace:"nowrap",boxShadow:gi===grpIdx?`0 4px 10px ${ch.color}40`:"none"}}
              onClick={()=>selectGroup(gi)}>Leç {g.label}</button>
          ))}
        </div>

        {/* Peatükid */}
        <div style={{display:"flex",gap:6,padding:"8px 14px",overflowX:"auto",borderBottom:"1px solid #f3f4f6"}}>
          {GROUPS[grpIdx].ids.map(id=>{
            const ci=CHAPTERS.findIndex(c=>c.id===id);
            const c=CHAPTERS[ci];
            const active=ch?.id===id;
            return(
              <button key={id} className="btn btn-sm"
                style={{background:active?c.color:"#f3f4f6",color:active?"#fff":"#6b7280",whiteSpace:"nowrap",boxShadow:active?`0 4px 10px ${c.color}40`:"none"}}
                onClick={()=>setChIdx(ci)}>{c.emoji} Leç {id}</button>
            );
          })}
        </div>

        {/* Tabid */}
        <div style={{display:"flex",gap:4,padding:"8px 10px",overflowX:"auto"}}>
          {TABS.map(t=>(
            <button key={t.id} className="tab" style={{background:tab===t.id?ch.color:"#f3f4f6",color:tab===t.id?"#fff":"#6b7280",boxShadow:tab===t.id?`0 4px 10px ${ch.color}40`:"none"}}
              onClick={()=>setTab(t.id)}>{t.label}</button>
          ))}
        </div>
        <LevelBar xp={xp} color={ch.color}/>
      </div>

      {showConf&&<Confetti/>}
      {xpPopup&&<XpPopup xp={xpPopup.amount} color={xpPopup.color}/>}
      <div className="fadein">
        {tab==="flash"&&<Flashcards chapter={ch} key={`f-${chIdx}`} onXp={addXp}/>}
        {tab==="dlg"&&<Dialogue chapter={ch} key={`d-${chIdx}`} onXp={addXp}/>}
        {tab==="listen"&&<Listening chapter={ch} key={`l-${chIdx}`}/>}
        {tab==="songs"&&<Songs chapter={ch} key={`s-${chIdx}`}/>}
        {tab==="quiz"&&<Quiz chapter={ch} key={`q-${chIdx}`} onXp={addXp}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
